      visual_id: wuxia_sado_final_phase_3_outside_calculation
      speaker: 흑사방주
      layout: final_phase_outside_calculation
      effect_cues:
        - kind: glyph_anomaly
          source: sado_final_phase_3_outside_calculation
          intensity: 0.9
          stable_terms: [계산식, 서하린, 무명, 목검]
          distortion: unpriced_lines_hold_against_ledger_formula
          duration_hint_ms: 1900
          fallback_text: 장부의 검은 칸 사이로 '계산식', '서하린', '무명', '목검'만 값이 쓰이지 않은 채 남는다.
    conditions:
      locations: [black_serpent_ledger_vault]
      required_flags: [sado_final_phase_2_weakpoint_control_resolved, final_phase_2_weakpoint_control_resolved, final_state_routing_seeded]
      forbidden_flags: [sado_final_phase_3_outside_calculation_resolved]
    choices:
      - id: remember_the_empty_place
        label: 비워둔 자리를 떠올린다
        outcome:
          resources:
            health: -1
            sanity: -2
          danger: 1
          add_flags: [sado_final_phase_3_outside_calculation_resolved, final_phase_3_outside_calculation_resolved, final_combat_result_battle_victory_seeded, final_boss_resolution_true_route_candidate_seeded, final_seoharin_axis_high_preserved_seeded, final_unpriced_wooden_sword_condition_raised_seeded, final_player_method_outside_calculation_confirmed_seeded]
          add_clues: [empty_place_is_not_for_sale, unpriced_wooden_sword_condition_rises, sado_calculation_fails_to_price_waiting]
          destination_id: black_serpent_ledger_vault
          log: 사도는 기다림에도 값이 붙는다고 말한다. 하지만 그 자리는 팔려고 비워 둔 것이 아니었다. 비어 있는 칸은 결핍이 아니라, 장부가 끝내 적지 못한 소속의 방식으로 남는다.
      - id: let_mumyeong_choose_own_flow
        label: 무명에게 자기 흐름을 선택하게 한다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [sado_final_phase_3_outside_calculation_resolved, final_phase_3_outside_calculation_resolved, final_combat_result_battle_victory_seeded, final_boss_resolution_true_or_meaningful_candidate_seeded, final_mumyeong_salvation_substantial_candidate_seeded, final_successor_route_suppressed_confirmed_seeded, final_own_flow_choice_chosen_seeded, final_player_method_protected_as_person_confirmed_seeded]
          add_clues: [mumyeong_choice_is_not_a_tool, black_serpent_new_scale_suppressed, stolen_flow_stops_by_choice]
          destination_id: black_serpent_ledger_vault
          log: 무명은 네가 던진 답을 따라 움직이지 않는다. 그는 한 박자 늦게, 훔친 흐름이 아닌 자기 흐름으로 사도의 줄을 끊는다. 그 느림 때문에 칼 한 수를 잃지만, 후계 구도는 더는 같은 모양으로 이어지지 못한다.
      - id: endure_with_qingliu_will
        label: 청류문의 뜻으로 버틴다
        outcome:
          resources:
            health: -2
            sanity: -1
          danger: 1
          add_flags: [sado_final_phase_3_outside_calculation_resolved, final_phase_3_outside_calculation_resolved, final_combat_result_battle_victory_seeded, final_boss_resolution_meaningful_candidate_seeded, final_qingliu_rebuild_high_candidate_seeded, final_pressure_state_eased_confirmed_seeded, final_evidence_strong_support_seeded]
          add_clues: [qingliu_will_is_not_for_sale, starving_does_not_set_a_price, calculation_error_line_opened]
          destination_id: black_serpent_ledger_vault
          log: 뜻도 굶으면 팔린다는 사도의 말이 장부고를 울린다. 너는 굶어도 팔지 않으려고 뜻이라 부르는 것이라고 답하고, 청류문의 이름 몇 개가 줄에서 내려온다. 승리는 빠르지 않지만, 압박은 더 이상 같은 값으로 작동하지 않는다.
      - id: point_to_blank_in_ledger
        label: 장부의 빈칸을 지적한다
        outcome:
          resources:
            sanity: -2
          danger: 2
          add_flags: [sado_final_phase_3_outside_calculation_resolved, final_phase_3_outside_calculation_resolved, final_combat_result_battle_victory_seeded, final_boss_resolution_meaningful_or_true_candidate_seeded, final_item_logs_blank_ledger_seen_seeded, final_evidence_strong_confirmed_seeded, final_network_accountability_seeded]
          add_clues: [blank_space_in_sado_ledger_seen, unpriced_things_remain_unfinished, alliance_silence_can_be_answered]
          destination_id: black_serpent_ledger_vault
          log: 네 장부에도 비어 있는 칸이 있었다고 말하자, 사도는 아직 계산이 끝나지 않았을 뿐이라고 답한다. 그러나 빈칸은 그의 과거를 폭로하지 않는다. 다만 흑사방의 계산법이 세상 전부를 쓰지 못했다는 증거로 남는다.
      - id: answer_with_sado_calculation
        label: 사도식 계산으로 맞선다
        outcome:
          resources:
            sanity: -4
          danger: 2
          add_flags: [sado_final_phase_3_outside_calculation_resolved, final_phase_3_outside_calculation_resolved, final_combat_result_battle_victory_seeded, final_boss_resolution_corrupted_candidate_seeded, final_cheongirok_state_corruption_high_seeded, final_player_method_sado_style_calculation_seeded, final_successor_route_active_risk_seeded]
          add_clues: [good_calculation_is_not_good_victory, unnamed_ledger_title_risk, closed_gate_corruption_seeded]
          destination_id: black_serpent_ledger_vault
          log: 계산은 정확하다. 천기록의 문장과 사도의 장부가 잠깐 같은 방향을 가리키고, 너는 가장 빠른 길을 본다. 사도는 좋은 계산이었다고 말한다. 이길 수는 있지만, 그 승리의 제목은 아직 네 장부에 적히지 않았다.

  - id: wuxia_boss_resolution
    title: "보스 결산"
    body: 사도는 쓰러졌지만, 흑사방의 장부는 아직 닫히지 않았다. 마지막 장은 사도의 목숨값을 묻지 않는다. 네가 남긴 증거와 사람의 흐름, 무명의 선택 가능성, 천기록의 사용 방식이 사도의 계산법을 어디까지 무너뜨렸는지를 묻는다. 이 결산은 결말이 아니라, 후속 결산들이 어떤 후보를 받을지 정하는 기록이다.
    presentation:
      visual_id: wuxia_boss_resolution
      speaker: 천기록
      layout: boss_resolution_seed
      effect_cues:
        - kind: glyph_anomaly
          source: wuxia_boss_resolution
          intensity: 0.92
          stable_terms: [보스 결산, 흑사방, 무명, 무림맹]
          distortion: final_route_seeds_into_epilogue_candidates
          duration_hint_ms: 2000
          fallback_text: 천기록의 마지막 장에 '보스 결산', '흑사방', '무명', '무림맹'만 다른 먹빛으로 남는다.
    conditions:
      locations: [black_serpent_ledger_vault]
      required_flags: [sado_final_phase_3_outside_calculation_resolved, final_phase_3_outside_calculation_resolved, final_combat_result_battle_victory_seeded, final_state_routing_seeded]
      forbidden_flags: [boss_resolution_resolved]
    choices:
      - id: confirm_true_route_outside_calculation
        label: 계산식 밖의 승리를 결산한다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [boss_resolution_resolved, final_boss_resolution_true_route_confirmed_seeded, final_result_priority_applied_seeded, final_epilogue_candidates_true_route_seeded, final_broken_black_serpent_epilogue_candidate_seeded, final_seoharin_open_gate_candidate_seeded, final_mumyeong_second_wooden_sword_candidate_seeded, final_qingliu_future_high_candidate_seeded]
          add_clues: [boss_resolution_true_route_requires_unpriced_things, broken_black_serpent_not_simple_happy_ending, open_gate_suppresses_closed_gate_candidate]
          destination_id: black_serpent_ledger_vault
          log: 사도는 패배했고, 그의 장부는 비어 있는 칸을 끝내 값으로 바꾸지 못한다. 결산은 흑사방 붕괴와 열린 문 후보를 남기지만, 아직 서하린과 무명의 후속 결산을 대신하지는 않는다.
      - id: confirm_meaningful_victory_with_evidence
        label: 증거와 조직망 처리를 결산한다
        outcome:
          resources:
            sanity: -1
          danger: 1
          add_flags: [boss_resolution_resolved, final_boss_resolution_meaningful_victory_seeded, final_result_priority_applied_seeded, final_epilogue_candidates_meaningful_seeded, final_broken_black_serpent_epilogue_candidate_seeded, final_alliance_silence_strong_evidence_variant_seeded, final_black_serpent_banner_suppressed_candidate_seeded]
          add_clues: [strong_evidence_turns_silence_into_responsibility_evasion, ledger_secured_is_not_core_network_cut, broken_black_serpent_with_network_scars]
          destination_id: black_serpent_ledger_vault
          log: 장부와 증거는 사도의 방식이 혼자 선 괴물이 아니었음을 드러낸다. 흑사방은 꺾일 수 있지만, 무림맹의 침묵과 남은 조직망은 책임 회피의 형태로 다음 결산에 넘어간다.
      - id: confirm_incomplete_victory_residue
        label: 남은 장부와 잔향을 결산한다
        outcome:
          resources:
            sanity: -1
          danger: 2
          add_flags: [boss_resolution_resolved, final_boss_resolution_incomplete_victory_seeded, final_result_priority_applied_seeded, final_epilogue_candidates_incomplete_seeded, final_black_serpent_banner_candidate_seeded, final_southern_market_rumor_candidate_seeded, final_alliance_silence_partial_evidence_variant_seeded]
          add_clues: [burned_or_partial_ledger_leaves_residue, southern_market_rumor_remains_possible, alliance_silence_can_hide_behind_partial_evidence]
          destination_id: black_serpent_ledger_vault
          log: 이겼지만 모든 장부가 닫힌 것은 아니다. 불완전한 증거와 남은 소문은 흑사방의 깃발이 다른 시장에서 다시 보일 수 있다는 후보로 기록된다.
      - id: confirm_mumyeong_unsaved_successor_risk
        label: 무명 후계 구도의 위험을 결산한다
        outcome:
          resources:
