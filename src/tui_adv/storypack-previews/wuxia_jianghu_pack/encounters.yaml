        outcome:
          resources:
            sanity: -4
          danger: 2
          add_flags: [boss_resolution_resolved, final_boss_resolution_corrupted_victory_seeded, final_result_priority_applied_seeded, final_epilogue_candidates_corrupted_seeded, final_seoharin_closed_gate_candidate_seeded, final_cheongirok_last_page_corruption_variant_seeded, final_black_serpent_new_scale_candidate_seeded]
          add_clues: [good_calculation_can_still_be_corruption, closed_gate_overrides_open_gate_candidate, cheongirok_corruption_is_not_high_use]
          destination_id: black_serpent_ledger_vault
          log: 승리는 남았지만 결산의 필체가 사도와 닮아 있다. 천기록은 이 결과를 패배로 쓰지 않는다. 다만 열린 문 후보보다 닫힌 문 후보가 먼저 읽히는 오염된 승리로 남긴다.

  - id: wuxia_mumyeong_resolution
    title: "무명 결산"
    body: 보스 결산은 사도의 장부를 닫았지만, 무명의 이름 없는 장은 아직 남아 있다. 이 결산은 무명이 청류문으로 돌아오는지를 먼저 묻지 않는다. 훔친 초식이 어디서 멈추는지, 흑사방 후계 구도가 끊기는지, 서하린과 청류문으로 다시 이어질 여지가 남는지를 기록한다. 결말 카드를 바로 지급하지 않고, 후속 후일담 후보만 씨앗으로 남긴다.
