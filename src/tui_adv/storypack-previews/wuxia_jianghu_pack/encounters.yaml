          add_clues: [mumyeong_salvation_is_not_return_to_qingliu, own_flow_suppresses_successor_route, second_wooden_sword_is_candidate_not_payout]
          destination_id: black_serpent_ledger_vault
          log: 너는 무명에게 누구의 초식이 더 강한지 묻지 않는다. 자기 흐름을 묻자, 훔친 형식의 틈 사이로 처음 듣는 호흡이 남는다. 천기록은 이것을 귀환이 아니라 후계 구도 억제와 두 번째 목검 후보로 적는다.
      - id: reveal_boss_used_mumyeongs_wound
        label: 보스가 무명의 상처를 이용했음을 드러낸다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [mumyeong_resolution_resolved, final_mumyeong_resolution_relational_salvation_seeded, final_mumyeong_truth_state_not_forced_seeded, final_mumyeong_successor_route_weakened_seeded, final_epilogue_mumyeong_unsent_apology_candidate_seeded, final_epilogue_mumyeong_second_wooden_sword_candidate_seeded]
          add_clues: [truth_can_open_apology_without_forcing_identity, boss_used_wound_but_does_not_define_mumyeong, relational_salvation_is_not_full_return]
          destination_id: black_serpent_ledger_vault
          log: 사도가 본 것은 무명의 재능이 아니라 상처를 권력으로 바꾸는 자리였다. 그 사실은 무명을 대신 구원하지 않는다. 다만 사과와 두 번째 목검 후보가 강요 없는 진실의 자리로 열린다.
      - id: leave_room_for_unsent_apology
        label: 전하지 못한 사과가 남을 자리를 둔다
        outcome:
          resources:
            sanity: -1
          danger: 1
          add_flags: [mumyeong_resolution_resolved, final_mumyeong_resolution_incomplete_salvation_seeded, final_mumyeong_truth_state_partial_seeded, final_epilogue_mumyeong_unsent_apology_candidate_seeded, final_epilogue_mumyeong_second_wooden_sword_conditional_seeded]
          add_clues: [partial_truth_keeps_apology, incomplete_salvation_is_still_a_trace, apology_is_not_truth_delivery]
          destination_id: black_serpent_ledger_vault
          log: 모든 말을 전하지 않았기 때문에 남는 말도 있다. 무명의 결산은 완전한 구원이 아니라 미완의 사과 후보를 남기고, 두 번째 목검은 조건부 흔적으로만 적힌다.
