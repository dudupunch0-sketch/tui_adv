          add_clues: [sado_defeat_does_not_save_mumyeong, black_serpent_new_scale_is_successor_risk, mumyeong_resolution_still_required]
          destination_id: black_serpent_ledger_vault
          log: 사도의 패배가 곧 무명의 구원을 뜻하지는 않는다. 후계 구도가 끊기지 않았다면, 흑사방은 새 저울을 얻은 채 다음 무명 결산을 기다린다.
      - id: confirm_corrupted_victory
