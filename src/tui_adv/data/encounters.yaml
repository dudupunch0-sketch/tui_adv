encounters:
  - id: ex_employee_messenger
    title: 퇴사자의 메신저
    body: 퇴사한 전임자에게서 사내 메신저가 도착했다.
    conditions:
      locations: [dev_desk]
    choices:
      - id: check_message
        label: 메시지를 확인한다
        cost:
          battery: 3
          sanity: 2
        outcome:
          add_clues: [ex_employee_contacted]
          log: 퇴사자의 메시지를 확인했다.
      - id: ignore_phone
        label: 무시하고 휴대폰을 엎어둔다
        outcome:
          sanity: 2
          log: 휴대폰을 엎어두자 알림음이 한 박자 늦게 멈췄다.
      - id: search_ex_employee
        label: 전임자의 이름을 사내망에서 검색한다
        cost:
          battery: 8
        outcome:
          add_items: [ex_employee_memo]
          add_flags: [truth_route_started]
          log: 사내망 캐시에 남은 전임자의 흔적을 찾았다.
      - id: trace_packet_delay
        label: "[인터페이스] 알림 지연 시간을 역추적한다"
        conditions:
          min_abilities:
            interface: 4
        cost:
          battery: 2
        outcome:
          log: 알림 패킷을 조심스럽게 붙잡았다.
        check:
          ability: interface
          difficulty: 10
          success:
            add_clues: [delayed_packet_route]
            add_flags: [network_truth_hint]
            log: 지연 시간 사이에서 숨은 라우팅을 찾았다.
          failure:
            resources:
              sanity: -4
            danger: 1
            log: 패킷이 역으로 당신의 단말을 훑고 지나갔다.

  - id: printer_prints_alone
    title: 복합기가 혼자 출력한다
    body: 꺼져 있던 복합기가 아직 하지 않은 선택을 출력한다.
    conditions:
      locations: [printer_area]
    choices:
      - id: read_printout
        label: 출력물을 읽는다
        cost:
          sanity: 3
        outcome:
          add_clues: [future_choice_printout]
          log: 출력물에는 아직 고르지 않은 선택지가 적혀 있었다.
      - id: take_printout
        label: 출력물을 챙긴다
        outcome:
          add_items: [crumpled_printout]
          add_flags: [printer_secret_started]
          log: 따뜻한 출력물을 접어 주머니에 넣었다.
      - id: check_toner
        label: 토너 카트리지를 확인한다
        conditions:
          min_resources:
            sanity: 40
        outcome:
          add_clues: [reality_link_hint_1]
          add_flags: [reality_link_started]
          log: 토너 카트리지 안쪽에서 이상한 표식을 봤다.

  - id: pantry_coffee_machine
    title: 탕비실 커피머신
    body: 커피머신 화면에 '물을 보충하십시오'가 반복된다. 물통은 가득 차 있다.
    conditions:
      locations: [pantry]
    choices:
      - id: brew_coffee
        label: 커피를 뽑는다
        outcome:
          resources:
            sanity: 4
            hunger: -3
            thirst: 5
          log: 커피는 아직 따뜻했고, 컵 바닥에는 작은 검은 점이 남았다.
      - id: inspect_water_tank
        label: 물통을 확인한다
        outcome:
          resources:
            sanity: -2
          add_clues: [full_water_tank_warning]
          log: 물통은 가득 차 있는데 센서는 계속 빈 상태를 보고했다.
      - id: look_behind_machine
        label: 커피머신 뒤를 본다
        conditions:
          required_flags: [printer_secret_started]
        outcome:
          add_clues: [reality_link_hint_2]
          add_flags: [coffee_machine_back_panel, pantry_hint_seen]
          log: 커피머신 뒤쪽 패널에 복합기 출력물과 같은 표식이 있었다.
      - id: take_bottled_water
        label: 밀봉된 생수 한 병을 챙긴다
        outcome:
          add_items: [bottled_water]
          log: 탕비실 냉장고 문 안쪽에서 밀봉된 생수 한 병을 꺼냈다.

  - id: strange_water_dispenser
    title: 정수기의 이상한 물
    body: 정수기에서 물소리가 나지만 컵에는 물이 차지 않는다. 목이 마를수록 빈 컵 안쪽이 출렁이는 것처럼 보인다.
    conditions:
      locations: [pantry]
      min_resources:
        thirst: 60
      forbidden_flags: [thirst_hallucination_seen]
    choices:
      - id: drink_false_water
        label: 물을 마신다
        outcome:
          resources:
            thirst: -25
            sanity: -8
          add_flags: [thirst_hallucination_seen]
          log: 빈 컵을 삼키자 목은 잠깐 식었지만 정수기 표시등이 당신의 이름을 깜빡였다.
      - id: search_for_bottled_water
        label: 생수병을 찾는다
        cost:
          sanity: 2
        outcome:
          add_items: [bottled_water]
          add_flags: [thirst_hallucination_seen]
          log: 정수기 아래 수납칸에서 실제로 밀봉된 생수 한 병을 찾았다.
      - id: unplug_dispenser
        label: 정수기 전원을 뽑는다
        outcome:
          danger: -1
          add_clues: [water_dispenser_false_sound]
          add_flags: [thirst_hallucination_seen]
          log: 플러그를 뽑자 물소리는 멈췄지만 컵 안쪽의 물결은 한 박자 늦게 사라졌다.

  - id: supply_closet_cache
    title: 물품창고 비상 보급함
    body: 물품창고 안쪽 선반에 '재난 대응 키트'라고 적힌 박스가 열려 있다. 누군가 필요한 것만 가져가라는 듯 세 칸을 비워 두었다.
    conditions:
      locations: [supply_closet]
    choices:
      - id: take_first_aid_kit
        label: 구급상자를 챙긴다
        outcome:
          add_items: [first_aid_kit]
          log: 비상 보급함에서 구급상자를 꺼냈다.
      - id: take_power_bank
        label: 보조배터리를 챙긴다
        outcome:
          add_items: [power_bank]
          log: 비상 보급함 아래칸에서 충전 케이블이 묶인 보조배터리를 챙겼다.
      - id: take_emergency_snack
        label: 비상 간식 봉지를 챙긴다
        outcome:
          add_items: [snack]
          log: 유통기한이 오늘로 끝나는 과자 봉지를 챙겼다.

  - id: meeting_room_all_hands
    title: 존재하지 않는 부서의 전체회의
    body: 회의실 화면에는 방금 저장된 회의록이 떠 있다. 참석자는 전 직원, 발언자는 당신 하나다.
    conditions:
      locations: [meeting_room]
      required_flags: [truth_route_started]
    choices:
      - id: save_impossible_minutes
        label: 회의록을 저장하고 패턴을 표시한다
        cost:
          battery: 4
          sanity: 5
        outcome:
          add_flags: [impossible_meeting_saved]
          add_clues: [meeting_pattern_noticed]
          log: 회의록의 발언 시간이 모두 같은 초 단위로 반복된다는 것을 표시했다.
      - id: leave_without_saving
        label: 저장하지 않고 회의실을 나간다
        outcome:
          resources:
            sanity: 1
          log: 회의실 문이 닫히자 방금 전 회의 알림이 취소되었다.

  - id: security_room_delayed_cctv
    title: 지연된 CCTV 화면
    body: 보안실 모니터들은 복도보다 한 박자 늦은 장면을 반복한다. 조금 전 당신이 한 선택도 녹화되어 있다.
    conditions:
      locations: [security_room]
      required_flags: [impossible_meeting_saved]
      required_clues: [meeting_pattern_noticed]
    choices:
      - id: replay_delayed_cctv
        label: 지연된 CCTV 화면을 되감는다
        cost:
          battery: 6
          sanity: 4
        outcome:
          add_flags: [security_camera_mapped, isolation_protocol_revealed]
          add_clues: [server_log_fragment]
          log: CCTV 지연 프레임 사이에서 격리 프로토콜 로그 조각을 읽었다.
      - id: cover_cameras
        label: 모니터를 덮고 보안실을 떠난다
        outcome:
          resources:
            sanity: 2
          log: 꺼진 모니터들이 천천히 당신을 놓아주었다.

  - id: security_room_floor_mismatch_console
    title: 어긋난 층수의 보안 콘솔
    body: 엘리베이터가 토해낸 보안실의 출입 기록은 현재 층을 서로 다른 세 숫자로 적고 있다. 틀린 층수 하나가 서버실 문과 같은 색으로 깜빡인다.
    conditions:
      locations: [security_room]
      required_clues: [security_floor_misalignment]
      required_flags: [elevator_returned_wrong_floor]
    choices:
      - id: extract_security_override
        label: 보안실 층수 로그에서 서버실 우회권한을 뽑는다
        cost:
          battery: 6
          sanity: 3
        outcome:
          add_items: [security_override_badge]
          add_clues: [security_override_route]
          add_flags: [security_override_unlocked]
          log: 어긋난 층수 로그를 하나로 접자 서버실 우회권한이 임시 배지처럼 발급되었다.
      - id: loop_cctv_delay
        label: 지연된 CCTV를 서버실 앞에 고정한다
        cost:
          battery: 3
        outcome:
          add_clues: [server_room_cctv_blindspot]
          add_flags: [cctv_delay_looped]
          log: 서버실 앞 CCTV가 당신보다 한 박자 늦게 감시하도록 루프를 걸었다.
      - id: leave_misaligned_room
        label: 층수 기록을 닫고 보안실을 나간다
        outcome:
          resources:
            sanity: 1
          log: 보안실 문패가 다시 현재 층을 모르는 척했다.

  - id: emergency_stairs_exit_sign
    title: 비상계단 문틈 표식
    body: 비상계단 문틈의 초록색 표식이 층수 표시와 같은 박자로 숨을 쉰다.
    conditions:
      locations: [emergency_stairs]
      forbidden_flags: [escape_puzzle_ready]
    choices:
      - id: align_breathing_floor
        label: 계단문 틈의 숨소리와 층수 표시를 맞춘다
        cost:
          sanity: 3
        outcome:
          add_flags: [escape_puzzle_ready]
          log: 초록 표식이 한 번 꺼졌다 켜지자 반복되는 층수의 규칙이 드러났다.
      - id: ignore_exit_sign
        label: 표식과 눈을 마주치지 않고 계단을 살핀다
        outcome:
          sanity: 1
          log: 표식은 시야 가장자리에 초록빛 잔상을 남겼지만 더는 따라오지 않았다.

  - id: spatial_exit_puzzle
    title: 비상계단 공간 왜곡
    body: 층수 표시는 4, 4, 4, 4를 반복한다. 한 칸만 진짜 계단처럼 숨을 쉰다.
    conditions:
      locations: [emergency_stairs]
      required_flags: [escape_puzzle_ready]
    choices:
      - id: solve_distorted_floor
        label: 반복되는 층수의 비밀을 풀고 문을 통과한다
        outcome:
          add_flags: [escape_route_completed]
          log: 층수 표시가 한 번 거꾸로 흐른 뒤 비상문이 열렸다.
      - id: walk_down_wrong_stairs
        label: 아래라고 믿고 계속 내려간다
        outcome:
          resources:
            sanity: -25
          add_flags: [spatial_exit_failed]
          log: 내려갈수록 계단은 회사 안쪽으로 더 깊게 접혔다.

  - id: server_room_radio
    title: 서버실 문 앞 무전기
    body: 닫힌 서버실 문틈에서 사내 방송이 거꾸로 새어 나온다.
    conditions:
      locations: [server_room_front]
    choices:
      - id: tune_internal_channel
        label: 제한된 주파수를 맞춘다
        cost:
          battery: 5
          sanity: 3
        outcome:
          add_flags: [server_room_broadcast_controlled]
          add_clues: [internal_channel_key]
          log: 사내 방송의 잡음 뒤에서 통제 채널을 붙잡았다.
      - id: back_away_from_signal
        label: 신호에서 물러난다
        outcome:
          sanity: 1
          log: 무전기 소리가 잠깐 당신의 목소리를 흉내 내다가 멈췄다.
      - id: follow_cold_air
        label: 문틈의 찬 공기를 따라 안쪽으로 들어간다
        cost:
          sanity: 2
        outcome:
          destination_id: server_room
          add_flags: [server_room_entered]
          log: 서버실 문은 열리지 않았지만, 당신은 이미 문 안쪽에 서 있었다.
      - id: enter_with_security_override
        label: 보안실 우회권한으로 서버실 문을 연다
        conditions:
          required_items: [security_override_badge]
          required_flags: [security_override_unlocked]
        cost:
          battery: 2
        outcome:
          destination_id: server_room
          add_flags: [server_room_entered, security_override_used]
          log: 우회권한을 대자 서버실 문은 잠금 해제가 아니라 예외 처리로 당신을 통과시켰다.

  - id: server_room_console
    title: 관리자 콘솔
    body: 랙 사이 KVM 콘솔에는 관리자 세션이 잠들지 않은 채 남아 있다.
    conditions:
      locations: [server_room]
    choices:
      - id: assume_admin_console
        label: 관리자 콘솔에 격리 규칙을 덮어쓴다
        cost:
          battery: 10
          sanity: 6
        outcome:
          add_flags: [network_admin_claimed, internal_network_access]
          add_clues: [admin_console_signature]
          log: 관리자 콘솔의 격리 규칙을 당신의 퇴근 규칙으로 덮어썼다.
      - id: pull_network_cable
        label: 가장 두꺼운 케이블을 뽑는다
        outcome:
          resources:
            sanity: -8
          add_flags: [network_backlash]
          log: 케이블을 뽑자 서버실 전체가 당신의 심장 박동으로 재부팅했다.
      - id: lock_isolation_with_security_override
        label: 출입 로그와 격리 규칙을 함께 잠근다
        conditions:
          required_items: [security_override_badge]
          required_flags: [security_override_used]
        cost:
          battery: 8
          sanity: 5
        outcome:
          add_flags: [network_admin_claimed, internal_network_access, security_lockdown_claimed]
          add_clues: [security_lockdown_signature]
          log: 출입 로그와 격리 규칙이 같은 해시로 묶이자 보안실과 서버실이 당신을 예외 관리자라고 불렀다.

  - id: elevator_nonexistent_floor
    title: 존재하지 않는 층의 엘리베이터
    body: 엘리베이터 버튼 패널에는 없던 R층이 켜져 있다. 외부 인터넷 아이콘은 한 칸만 떠 있지만, 층수 표시는 계속 옥상을 가리킨다.
    conditions:
      locations: [elevator_hall]
    choices:
      - id: press_rooftop_button
        label: 존재하지 않는 R층 버튼을 누른다
        cost:
          battery: 4
          sanity: 3
        outcome:
          destination_id: rooftop
          add_flags: [rooftop_accessed]
          add_clues: [nonexistent_rooftop_button]
          log: 버튼을 누르자 엘리베이터는 움직이지 않았지만 문 밖이 옥상으로 바뀌었다.
      - id: force_elevator_doors
        label: 문틈을 벌려 현재 층으로 돌아온다
        outcome:
          destination_id: security_room
          resources:
            health: -4
          add_clues: [security_floor_misalignment]
          add_flags: [elevator_returned_wrong_floor]
          log: 엘리베이터 문틈을 억지로 벌리자 보안실 모니터들이 방금 전의 현재 층을 되감아 보여 주었다.

  - id: rooftop_signal
    title: 옥상의 제한된 외부 신호
    body: 옥상 난간 너머로 도시의 불빛이 보인다. 휴대폰은 외부 인터넷을 한 번만 보낼 수 있을 만큼의 신호를 붙잡았다.
    conditions:
      locations: [rooftop]
      required_flags: [rooftop_accessed]
    choices:
      - id: send_limited_signal
        label: 제한된 외부 신호를 짧게 송신한다
        cost:
          battery: 12
          sanity: 5
        outcome:
          add_flags: [rooftop_signal_sent]
          add_clues: [outside_signal_ack]
          log: 짧은 구조 신호가 전송되자 옥상 비상등이 실제 밤하늘과 같은 박자로 깜빡였다.
      - id: record_wrong_skyline
        label: 어긋난 도시 야경을 녹화한다
        cost:
          battery: 5
        outcome:
          resources:
            sanity: -4
          add_clues: [wrong_skyline_recording]
          log: 녹화된 야경에는 회사 건물이 바깥에서 보이지 않았다.

  - id: parking_ignition
    title: 지하주차장의 시동음
    body: 지하주차장 어딘가에서 시동이 걸린 차가 낮게 떨고 있다. 운전석에는 아무도 없고, 대시보드에는 사내망 출입 안내가 떠 있다.
    conditions:
      locations: [parking_lot]
    choices:
      - id: follow_idling_engine
        label: 켜져 있는 차의 키태그를 찾는다
        cost:
          battery: 4
          sanity: 3
        outcome:
          add_items: [parking_key_fob]
          add_clues: [idling_engine_trace]
          add_flags: [parking_key_found]
          log: 시동음이 가장 크게 울리는 차의 컵홀더에서 작은 키태그를 찾았다.
      - id: silence_engine
        label: 시동음을 무시하고 차 사이를 지나간다
        outcome:
          resources:
            sanity: 1
