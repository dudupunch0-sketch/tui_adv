secrets:
  - id: real_note_001
    title: 첫 번째 현실 연결 힌트
    unlock_flags:
      - printer_secret_started
      - pantry_hint_seen
    public_hint_steps:
      - 커피 냄새가 남아 있는 방을 기억한다.
      - 차가운 문과 종이 냄새 사이의 반복 표식을 찾는다.
      - 복합기에 붙은 IP 주소 표의 숫자들을 모두 더한다.
      - 마지막 문장은 로컬 비공개 파일이 있을 때만 완성된다.
    puzzle_prompt: 복합기에 붙은 IP 주소 표의 숫자들을 모두 더한다.
    placeholder_ip_address: 192.168.0.42
    final_hint_policy: private_only
    reward_text: 이 힌트는 게임 안의 장소만을 말하는 것 같지 않다.

  - id: real_note_002
    title: 두 번째 현실 연결 힌트
    unlock_flags:
      - reality_link_started
      - reality_link_second_seen
      - pantry_hint_seen
    public_hint_steps:
      - 토너 카트리지 안쪽 표식과 커피머신 점검 라벨을 같은 방향으로 본다.
      - 점검 라벨에 적힌 사내망 IP 주소의 숫자들을 모두 더한다.
      - 첫 번째 힌트와 다른 숫자라면 두 번째 메모를 찾는 좌표가 된다.
      - 마지막 문장은 로컬 비공개 파일이 있을 때만 완성된다.
    puzzle_prompt: 커피머신 점검 라벨의 IP 주소 숫자들을 모두 더한다.
    placeholder_ip_address: 10.30.0.45
    final_hint_policy: private_only
    reward_text: 두 번째 힌트는 같은 사무실 안의 다른 현실 물체를 가리킨다.
