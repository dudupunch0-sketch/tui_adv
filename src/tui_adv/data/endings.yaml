endings:
  - id: game_over_spatial_collapse
    name: "게임오버: 계단이 접혔다"
    kind: failure
    priority: 100
    conditions:
      required_flags: [spatial_exit_failed]
    text: 공간 왜곡의 규칙을 틀렸다. 계단은 아래가 아니라 당신 안쪽으로 접혔다.

  - id: escape_commute
    name: 퇴근 성공
    kind: escape
    priority: 60
    conditions:
      locations: [emergency_stairs]
      required_flags: [escape_route_completed]
      min_resources:
        health: 1
        sanity: 1
    text: |
      공간 왜곡 속에서 반복되는 층수를 맞춰 풀었다.
      비상문 너머의 평범한 밤공기가 당신을 퇴근시켰다.

      [POST-ESCAPE REPORT]
      survivor_count: 1
      evidence_level: 0
      company_response: denial
      employee_status: access_revoked
      risk_level: ongoing

      ENDING: 정문 밖

  - id: hidden_reality_hint_001
    name: 첫 번째 현실 연결 힌트
    kind: hidden
    priority: 80
    conditions:
      required_items: [crumpled_printout]
      required_flags: [printer_secret_started, pantry_hint_seen]
      min_resources:
        health: 1
        sanity: 1
    local_hint_id: real_note_001
    text: >
      출력물의 마지막 문장은 더 이상 게임 속 장소만을 말하지 않았다.
      커피 냄새와 복합기 표식이 하나의 계산으로 이어졌다.

  - id: hidden_reality_hint_002
    name: 두 번째 현실 연결 힌트
    kind: hidden
    priority: 82
    conditions:
      required_clues: [reality_link_hint_1, reality_link_hint_2]
      required_flags: [reality_link_started, reality_link_second_seen, pantry_hint_seen]
      min_resources:
        health: 1
        sanity: 1
    local_hint_id: real_note_002
    text: >
      토너 안쪽 표식과 커피머신 점검 라벨의 숫자가 같은 현실 좌표를 향했다.
      이번 단서는 출력물 없이도 사무실 어딘가에 남은 두 번째 메모를 가리킨다.

  - id: hidden_reality_hint_003
    name: 세 번째 현실 연결 힌트
    kind: hidden
    priority: 84
    conditions:
      required_clues: [future_choice_printout, reality_link_hint_3]
      required_flags: [reality_link_third_seen, meeting_marker_seen]
      min_resources:
        health: 1
        sanity: 1
    local_hint_id: real_note_003
    text: >
      출력물이 예고한 빈 선택지가 회의실 화이트보드 모서리와 정확히 겹쳤다.
      세 번째 단서는 회의 기록이 아니라 현실 사무실에 남겨진 작은 표식을 향한다.

  - id: truth_isolation_protocol
    name: 격리 프로토콜의 진실
    kind: truth
    priority: 70
    conditions:
      required_items: [ex_employee_memo]
      required_clues: [meeting_pattern_noticed, server_log_fragment]
      required_flags: [impossible_meeting_saved, isolation_protocol_revealed]
      min_resources:
        health: 1
        sanity: 1
    text: >
      삭제된 출입 기록과 회의록은 같은 결론을 가리켰다.
      사라진 것은 직원들이 아니라 당신이 접속한 업무공간이었다.
      회사는 이 현상을 격리 프로토콜이라고 불렀다.

  - id: conquest_network_admin
    name: 사내망 관리자 권한
    kind: conquest
    priority: 70
    conditions:
      locations: [server_room]
      required_flags: [network_admin_claimed]
      min_resources:
        health: 1
        sanity: 1
    text: >
      관리자 콘솔은 당신을 임시 예외가 아니라 규칙 작성자로 받아들였다.
      이제 회사의 격리 공간은 당신의 퇴근 절차를 승인해야 한다.

  - id: conquest_security_lockdown
    name: 보안 격리 권한 장악
    kind: conquest
    priority: 75
    conditions:
      locations: [server_room]
      required_flags: [security_lockdown_claimed]
      min_resources:
        health: 1
        sanity: 1
    text: >
      어긋난 층수의 보안 기록과 서버실 격리 규칙이 하나의 예외 권한으로 묶였다.
      이제 회사는 당신을 감시 대상이 아니라 잠금 절차의 소유자로 취급한다.

  - id: conquest_broadcast_channel
    name: 사내 방송 장악
    kind: conquest
    priority: 50
    conditions:
      required_flags: [server_room_broadcast_controlled]
      min_resources:
        health: 1
        sanity: 1
    text: >
      당신은 제한된 사내 방송 채널을 붙잡았다.
      이제 회사는 더 이상 알 수 없는 목소리만으로 명령하지 못한다.

  - id: escape_rooftop_signal
    name: 옥상 외부 신호
    kind: escape
    priority: 65
    conditions:
      locations: [rooftop]
      required_flags: [rooftop_signal_sent]
      required_clues: [outside_signal_ack]
      min_resources:
        health: 1
        sanity: 1
    text: >
      제한된 외부 신호가 옥상 비상등을 실제 밤하늘과 동기화했다.
      누군가 회사 바깥에서 이 건물이 아직 있다는 사실을 확인했다.

  - id: escape_parking_lot
    name: 지하주차장 탈출
    kind: escape
    priority: 64
    conditions:
      locations: [parking_lot]
      required_items: [parking_key_fob]
      required_clues: [parking_exit_route]
      required_flags: [parking_ramp_opened]
      min_resources:
        health: 1
        sanity: 1
    text: >
      지하주차장 차단기가 한 번 더 흔들리더니 회사의 격리 경계가 출구 램프를 놓쳤다.
      헤드라이트가 켜진 빈 차들 사이로, 실제 도로의 습한 공기가 당신을 밀어냈다.

  - id: escape_lobby_revolving_door
    name: 로비 회전문 탈출
    kind: escape
    priority: 66
    conditions:
      locations: [lobby]
      required_items: [visitor_badge]
      required_clues: [outside_lobby_reflection]
      required_flags: [lobby_exit_opened]
      min_resources:
        health: 1
        sanity: 1
    text: >
      방문객 퇴실 절차가 회사의 격리 규칙보다 먼저 처리되었다.
      로비 회전문은 같은 풍경을 반복하는 일을 멈추고, 당신을 실제 도로 쪽으로 밀어냈다.

  - id: conquest_executive_approval
    name: 대표 승인권 장악
    kind: conquest
    priority: 76
    conditions:
      locations: [executive_office]
      required_clues: [executive_signature_loop]
      required_flags: [executive_approval_claimed, company_policy_overwritten]
      min_resources:
        health: 1
        sanity: 1
    text: >
      대표 승인란에 입력된 이름이 회사의 생존 규칙 위로 번졌다.
      이제 모든 결재선은 당신의 퇴근 여부를 묻기 전에 먼저 당신에게 승인받아야 한다.
