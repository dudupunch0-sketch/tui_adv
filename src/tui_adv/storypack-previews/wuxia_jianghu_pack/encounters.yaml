          source: wuxia_mumyeong_resolution
          intensity: 0.9
          stable_terms: [무명, 자기 흐름, 사과, 검은 뱀]
          distortion: stolen_forms_split_into_resolution_candidates
          duration_hint_ms: 2000
          fallback_text: 이름 없는 장 위에 '무명', '자기 흐름', '사과', '검은 뱀'이 서로 다른 먹빛으로 갈라진다.
    conditions:
      locations: [black_serpent_ledger_vault]
      required_flags: [boss_resolution_resolved, final_result_priority_applied_seeded, final_combat_result_battle_victory_seeded, final_state_routing_seeded]
      forbidden_flags: [mumyeong_resolution_resolved]
