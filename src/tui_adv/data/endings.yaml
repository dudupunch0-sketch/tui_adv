endings:
  - id: game_over_spatial_collapse
    name: "게임오버: 계단이 접혔다"
    kind: failure
    priority: 100
    conditions:
      required_flags: [spatial_exit_failed]
    text: 공간 왜곡의 규칙을 틀렸다. 계단은 아래가 아니라 당신 안쪽으로 접혔다.

  - id: escape_commute
    name: 퇴근 성공
    kind: escape
    priority: 60
    conditions:
      locations: [emergency_stairs]
      required_flags: [escape_route_completed]
      min_resources:
        health: 1
        sanity: 1
    text: >
      공간 왜곡 속에서 반복되는 층수를 맞춰 풀었다.
      비상문 너머의 평범한 밤공기가 당신을 퇴근시켰다.

  - id: hidden_reality_hint_001
    name: 첫 번째 현실 연결 힌트
    kind: hidden
    priority: 80
    conditions:
      required_items: [crumpled_printout]
      required_flags: [printer_secret_started, pantry_hint_seen]
      min_resources:
        health: 1
        sanity: 1
    local_hint_id: real_note_001
    text: >
      출력물의 마지막 문장은 더 이상 게임 속 장소만을 말하지 않았다.
      커피 냄새와 복합기 표식이 하나의 계산으로 이어졌다.

  - id: truth_isolation_protocol
    name: 격리 프로토콜의 진실
    kind: truth
    priority: 70
    conditions:
      required_items: [ex_employee_memo]
      required_clues: [meeting_pattern_noticed, server_log_fragment]
      required_flags: [impossible_meeting_saved, isolation_protocol_revealed]
      min_resources:
        health: 1
        sanity: 1
    text: >
      삭제된 출입 기록과 회의록은 같은 결론을 가리켰다.
      사라진 것은 직원들이 아니라 당신이 접속한 업무공간이었다.
      회사는 이 현상을 격리 프로토콜이라고 불렀다.

  - id: conquest_network_admin
    name: 사내망 관리자 권한
    kind: conquest
    priority: 70
    conditions:
      locations: [server_room]
      required_flags: [network_admin_claimed]
      min_resources:
        health: 1
        sanity: 1
    text: >
      관리자 콘솔은 당신을 임시 예외가 아니라 규칙 작성자로 받아들였다.
      이제 회사의 격리 공간은 당신의 퇴근 절차를 승인해야 한다.

  - id: conquest_broadcast_channel
    name: 사내 방송 장악
    kind: conquest
    priority: 50
    conditions:
      required_flags: [server_room_broadcast_controlled]
      min_resources:
        health: 1
        sanity: 1
    text: >
      당신은 제한된 사내 방송 채널을 붙잡았다.
      이제 회사는 더 이상 알 수 없는 목소리만으로 명령하지 못한다.
