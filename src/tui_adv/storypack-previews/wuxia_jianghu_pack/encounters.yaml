  - id: wuxia_seoharin_qingliu_resolution
    title: "서하린·청류문 결산"
    body: 무명의 이름 없는 장이 잠시 덮이고, 천기록은 청류문 산문으로 돌아온다. 서하린은 닫을 수 있는 문 앞에 서 있고, 청류문의 수련장에는 아직 새는 지붕과 다시 걸린 목검이 함께 남아 있다. 이 결산은 후일담을 출력하지 않는다. 서하린의 기다림이 돌아올 자리로 남는지, 청류문의 흐름이 다시 이어질 조건을 얻었는지만 다음 장의 후보로 남긴다.
    presentation:
      visual_id: wuxia_seoharin_qingliu_resolution
      speaker: 서하린
      layout: seoharin_qingliu_resolution_seed
      effect_cues:
        - kind: glyph_anomaly
          source: wuxia_seoharin_qingliu_resolution
          intensity: 0.88
          stable_terms: [서하린, 청류문, 산문, 목검]
          distortion: open_gate_and_leaking_roof_split_into_aftermath_seeds
          duration_hint_ms: 1950
          fallback_text: 청류문 산문 위에 '서하린', '청류문', '산문', '목검'만 닫히지 않은 먹빛으로 남는다.
    conditions:
      locations: [black_serpent_ledger_vault]
      required_flags: [mumyeong_resolution_resolved, boss_resolution_resolved, final_result_priority_applied_seeded, final_combat_result_battle_victory_seeded, final_state_routing_seeded]
      forbidden_flags: [seoharin_qingliu_resolution_resolved]
    choices:
      - id: leave_the_gate_unclosed
        label: 산문을 닫지 않는 결산을 남긴다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [seoharin_qingliu_resolution_resolved, final_seoharin_qingliu_resolution_positive_future_seeded, final_epilogue_seoharin_future_candidate_seeded, final_epilogue_seoharin_open_gate_candidate_seeded, final_epilogue_qingliu_future_candidate_seeded, final_epilogue_qingliu_restored_martial_art_conditional_seeded]
          add_clues: [open_gate_is_not_possession, seoharin_future_depends_on_return_place_not_claim, qingliu_future_is_poor_but_flowing]
          destination_id: black_serpent_ledger_vault
          log: 서하린은 산문을 열어 둔다. 그것은 용서나 보상 연애가 아니라, 돌아오는 사람이 길을 잃지 않게 하는 방식이다. 청류문은 가난하지만 다시 흐르는 후보로 기록된다.
      - id: record_qingliu_rebuild_without_glory
        label: 청류문 재건을 강호 최강이 아닌 흐름으로 적는다
        outcome:
          resources:
            sanity: -1
          danger: 1
          add_flags: [seoharin_qingliu_resolution_resolved, final_seoharin_qingliu_resolution_qingliu_stable_seeded, final_epilogue_qingliu_future_high_candidate_seeded, final_epilogue_qingliu_restored_martial_art_candidate_seeded, final_epilogue_boss_alliance_silence_conditional_seeded]
          add_clues: [qingliu_rebuild_is_not_power_ranking, restored_martial_art_is_flow_not_reward, alliance_silence_can_coexist_with_rebuild]
          destination_id: black_serpent_ledger_vault
          log: 청류문은 강호 최강이 되지 않는다. 새는 지붕과 다시 놓인 물동이, 복구된 초식의 흐름이 함께 남는다. 재건은 명예가 아니라 끊긴 물길을 다시 잇는 후보로 적힌다.
      - id: keep_empty_place_for_return_or_absence
        label: 비워둔 자리를 귀환과 부재 양쪽으로 남긴다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [seoharin_qingliu_resolution_resolved, final_seoharin_qingliu_resolution_empty_place_seeded, final_epilogue_seoharin_empty_place_candidate_seeded, final_epilogue_seoharin_future_candidate_seeded, final_unpriced_wooden_sword_condition_preserved_seeded]
          add_clues: [empty_place_can_be_return_or_absence, unpriced_wooden_sword_remains_log_not_item, seoharin_waiting_is_permission_not_price]
          destination_id: black_serpent_ledger_vault
          log: 빈 자리는 돌아오는 사람의 자리일 수도, 오래 비어 있을 자리일 수도 있다. 천기록은 목검을 지급하지 않는다. 다만 값이 매겨지지 않은 조건이 아직 사도의 장부 밖에 남았다고 적는다.
      - id: mark_qingliu_pressure_still_unresolved
        label: 남은 압박을 청류문의 약화 변주로 표시한다
        outcome:
          resources:
            health: -1
            sanity: -2
          danger: 2
          add_flags: [seoharin_qingliu_resolution_resolved, final_seoharin_qingliu_resolution_unresolved_pressure_seeded, final_epilogue_qingliu_future_weakened_variant_seeded, final_epilogue_southern_market_rumor_conditional_seeded, final_epilogue_boss_black_serpent_banner_conditional_seeded]
          add_clues: [qingliu_survival_can_remain_wounded, unresolved_pressure_is_not_player_blame, southern_market_rumor_remains_conditional]
          destination_id: black_serpent_ledger_vault
          log: 청류문은 살아남았지만, 표국 길목의 소문과 후원자의 침묵이 모두 사라진 것은 아니다. 결산은 실패 판정이 아니라 약화 변주와 미해결 풍문 후보를 남긴다.
      - id: close_the_gate_with_sado_logic
        label: 사도식 보호 논리로 산문을 닫는다
        outcome:
          resources:
            sanity: -4
          danger: 2
          add_flags: [seoharin_qingliu_resolution_resolved, final_seoharin_qingliu_resolution_closed_gate_seeded, final_epilogue_seoharin_closed_gate_candidate_seeded, final_epilogue_seoharin_open_gate_suppressed_seeded, final_epilogue_qingliu_future_dark_variant_seeded, final_epilogue_tianjilu_last_page_corruption_variant_seeded]
          add_clues: [closed_gate_is_protection_as_possession, sado_style_calculation_closes_return_place, open_gate_and_closed_gate_are_mutually_exclusive]
          destination_id: black_serpent_ledger_vault
          log: 산문은 닫힌다. 안쪽은 더 안전해 보이지만, 돌아오는 길은 더 좁아진다. 천기록은 이것을 서하린의 단순 비극이 아니라 소속감이 사도식 소유와 닮아가는 침식 후보로 남긴다.

  - id: wuxia_cheongirok_resolution
    title: "천기록 결산"
    body: 서하린과 청류문의 장이 잠시 멎자, 천기록의 마지막 장이 거의 빈 종이처럼 펼쳐진다. 그곳에는 정답도, 기록자의 이름도 없다. 다만 네가 기록을 이해의 보조로 썼는지, 사람을 줄 세우는 계산 도구로 썼는지에 따라 먹빛의 결이 달라진다. 이 결산은 후일담을 출력하지 않고, 마지막 장의 안전한 여운과 오염 변주 후보만 남긴다.
    presentation:
      visual_id: wuxia_cheongirok_resolution
      speaker: 천기록
      layout: cheongirok_resolution_seed
      effect_cues:
        - kind: glyph_anomaly
          source: wuxia_cheongirok_resolution
          intensity: 0.9
          stable_terms: [천기록, 마지막 장, 빈칸, 기록자]
          distortion: blank_last_page_reflects_method_not_answer
          duration_hint_ms: 2100
          fallback_text: 천기록의 마지막 장 위에 '천기록', '마지막 장', '빈칸', '기록자'만 번졌다가 지워진다.
    conditions:
      locations: [black_serpent_ledger_vault]
      required_flags: [seoharin_qingliu_resolution_resolved, mumyeong_resolution_resolved, boss_resolution_resolved, final_result_priority_applied_seeded, final_combat_result_battle_victory_seeded, final_state_routing_seeded]
      forbidden_flags: [cheongirok_resolution_resolved]
    choices:
      - id: turn_the_last_page_without_question
        label: 질문하지 않고 마지막 장을 넘긴다
        outcome:
          resources:
            sanity: -1
          danger: 1
          add_flags: [cheongirok_resolution_resolved, final_cheongirok_resolution_safe_high_use_seeded, final_cheongirok_state_high_use_not_corruption_seeded, final_epilogue_tianjilu_last_page_candidate_seeded, final_epilogue_tianjilu_safe_high_use_variant_seeded]
          add_clues: [record_does_not_answer_questions, high_use_is_not_corruption, last_page_turns_without_identity_reveal]
          destination_id: black_serpent_ledger_vault
          log: 천기록은 대답하지 않는다. 너는 마지막 장을 정답지처럼 붙잡지 않고 넘긴다. 많은 것을 보았다는 사실은 남지만, 그것이 곧 침식이라는 결론은 기록되지 않는다.
      - id: leave_blank_as_unpriced_place
        label: 빈칸을 값이 아닌 자리로 남긴다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [cheongirok_resolution_resolved, final_cheongirok_resolution_blank_place_seeded, final_epilogue_tianjilu_true_route_variant_seeded, final_unpriced_wooden_sword_condition_preserved_seeded, final_epilogue_seoharin_empty_place_candidate_reinforced_seeded, final_epilogue_seoharin_open_gate_candidate_reinforced_seeded]
          add_clues: [blank_space_is_not_missing_answer, unpriced_wooden_sword_remains_condition_not_item, true_route_blank_page_is_left_for_people]
          destination_id: black_serpent_ledger_vault
          log: 마지막 장의 빈칸은 실패한 답안지가 아니다. 값이 매겨지지 않은 목검과 닫히지 않은 산문처럼, 누군가가 돌아오거나 돌아오지 않을 자리를 남기는 방식이다. 천기록은 아이템을 지급하지 않는다.
      - id: read_the_lines_that_align_like_ledger
        label: 장부처럼 줄 맞는 글자를 읽는다
        outcome:
          resources:
            sanity: -4
          danger: 2
          add_flags: [cheongirok_resolution_resolved, final_cheongirok_resolution_corruption_variant_seeded, final_cheongirok_state_corruption_high_confirmed_seeded, final_player_method_sado_style_calculation_echo_seeded, final_epilogue_tianjilu_last_page_corruption_variant_seeded, final_epilogue_seoharin_closed_gate_candidate_seeded]
          add_clues: [record_can_be_misused_as_calculation, calculation_reduces_people_into_lines, corruption_variant_is_method_trace_not_punishment]
          destination_id: black_serpent_ledger_vault
          log: 천기록의 글자는 어느 순간 장부처럼 줄을 맞춘다. 그것은 기록자의 판결이 아니다. 네가 사람과 관계를 값으로 정렬하려 했던 방식이 마지막 장에 되비친 흔적이다.
      - id: close_record_before_it_becomes_answer
        label: 답이 되기 전에 기록을 덮는다
        outcome:
          resources:
            sanity: -1
          danger: 0
          add_flags: [cheongirok_resolution_resolved, final_cheongirok_resolution_low_use_silence_seeded, final_epilogue_tianjilu_last_page_candidate_seeded, final_cheongirok_identity_reveal_suppressed_seeded]
          add_clues: [not_every_blank_requires_reading, recorder_identity_stays_unrevealed, low_use_can_still_leave_afterimage]
          destination_id: black_serpent_ledger_vault
          log: 너는 마지막 장을 더 파고들지 않는다. 기록은 조용히 덮이고, 기록자의 정체는 끝내 이름이 되지 않는다. 그래도 빈 장의 여운은 다음 후일담 후보로 남는다.
      - id: let_record_reflect_the_method
        label: 결과보다 사용 방식을 비추게 둔다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [cheongirok_resolution_resolved, final_cheongirok_resolution_method_reflection_seeded, final_player_method_reflected_not_judged_seeded, final_epilogue_tianjilu_last_page_candidate_seeded, final_epilogue_candidates_ready_for_future_renderer_seeded]
          add_clues: [last_page_reflects_method_not_morality_score, cheongirok_is_not_boss_defeat_tool, future_epilogue_renderer_still_unopened]
          destination_id: black_serpent_ledger_vault
          log: 마지막 장은 승패를 다시 계산하지 않는다. 그 장은 네가 어떤 방식으로 사람, 기록, 증거, 관계를 다루었는지만 조용히 비춘다. 출력기는 아직 열리지 않고, 후보만 남는다.

  - id: wuxia_black_serpent_aftermath
    title: "흑사방 후일담 씨앗"
    body: 천기록의 마지막 장을 덮어도, 흑사방의 장부고에는 아직 끊어진 줄과 남은 매듭이 걸려 있다. 보스가 쓰러졌다는 사실, 깃발이 접혔다는 소문, 남쪽 장터의 빚 이야기, 무림맹의 침묵이 서로 다른 종이 위에 남는다. 이 장면은 후일담을 출력하지 않는다. 다만 부러진 검은 뱀, 접히지 않은 깃발, 장터 풍문, 책임 회피의 침묵을 future renderer가 읽을 수 있는 씨앗으로 정리한다.
    presentation:
      visual_id: wuxia_black_serpent_aftermath
      speaker: 천기록
      layout: black_serpent_aftermath_seed
      effect_cues:
        - kind: glyph_anomaly
          source: wuxia_black_serpent_aftermath
          intensity: 0.86
          stable_terms: [흑사방, 장부, 깃발, 남쪽 장터]
          distortion: aftermath_cards_are_seeded_not_rendered
          duration_hint_ms: 2200
          fallback_text: 장부 여백에 '흑사방', '장부', '깃발', '남쪽 장터'라는 말만 검은 실처럼 이어졌다가 끊어진다.
    conditions:
      locations: [black_serpent_ledger_vault]
      required_flags: [cheongirok_resolution_resolved, seoharin_qingliu_resolution_resolved, mumyeong_resolution_resolved, boss_resolution_resolved, final_result_priority_applied_seeded, final_combat_result_battle_victory_seeded, final_state_routing_seeded]
      forbidden_flags: [black_serpent_aftermath_resolved]
    choices:
      - id: mark_broken_serpent_without_erasing_scars
        label: 부러진 검은 뱀을 상처째 기록한다
        outcome:
          resources:
            sanity: -1
          danger: 1
          add_flags: [black_serpent_aftermath_resolved, final_black_serpent_aftermath_broken_serpent_seeded, final_epilogue_boss_broken_black_serpent_variant_ready_seeded, final_broken_black_serpent_epilogue_candidate_reinforced_seeded]
          add_clues: [broken_serpent_still_leaves_network_scars, boss_defeat_is_not_total_cleanup, future_epilogue_renderer_still_unopened]
          destination_id: black_serpent_ledger_vault
          log: 검은 뱀은 부러졌지만, 비늘 자국은 장부와 길목에 남아 있다. 천기록은 승리를 지우지 않되, 그것을 완전한 청소로 바꾸지도 않는다. 후일담 출력기는 아직 열리지 않는다.
      - id: fold_the_banner_without_calling_it_gone
        label: 깃발을 접되 사라졌다고 쓰지 않는다
        outcome:
          resources:
            sanity: -2
          danger: 2
          add_flags: [black_serpent_aftermath_resolved, final_black_serpent_aftermath_banner_residue_seeded, final_black_serpent_banner_candidate_reinforced_seeded, final_southern_market_rumor_candidate_seeded]
          add_clues: [banner_can_return_when_pressure_unresolved, organization_logic_outlives_one_boss, southern_market_rumor_remains_possible]
          destination_id: black_serpent_ledger_vault
          log: 깃발은 접힌다. 하지만 조직의 방식은 천 조각 하나보다 오래 남는다. 남쪽 장터의 빚 이야기와 잔당의 이름은 아직 같은 페이지에서 서로를 부를 수 있다.
      - id: send_ledger_to_alliance_and_watch_silence
        label: 장부를 무림맹에 보내고 침묵을 본다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [black_serpent_aftermath_resolved, final_black_serpent_aftermath_alliance_silence_seeded, final_alliance_silence_responsibility_evasion_seeded, final_broken_black_serpent_epilogue_candidate_reinforced_seeded]
          add_clues: [alliance_silence_can_be_responsibility_evasion, strong_evidence_does_not_force_confession, ledger_can_be_buried_as_private_document]
          destination_id: black_serpent_ledger_vault
          log: 장부가 무림맹으로 향한다. 답장이 오지 않는다고 해서 증거가 사라지는 것은 아니다. 침묵은 무죄 판결이 아니라 책임을 미루는 변주 후보로 남는다.
      - id: listen_for_southern_market_debt_rumor
        label: 남쪽 장터의 빚 풍문을 듣는다
        outcome:
          resources:
            health: -1
            sanity: -2
          danger: 2
          add_flags: [black_serpent_aftermath_resolved, final_black_serpent_aftermath_southern_market_rumor_seeded, final_southern_market_rumor_candidate_reinforced_seeded, final_black_serpent_pressure_unresolved_variant_seeded]
          add_clues: [southern_market_rumor_is_unresolved_debt_not_blame, pressure_can_move_without_banner, trade_routes_remember_black_serpent]
          destination_id: black_serpent_ledger_vault
          log: 남쪽 장터에서는 아직 빚 이야기가 돈다. 그것은 네 책임을 새로 씌우는 말이 아니라, 압박이 다른 길목으로 옮겨 갔다는 풍문이다. 천기록은 장터의 목소리를 후보로만 남긴다.
      - id: let_true_route_suppress_the_banner
        label: 진로의 결과로 깃발과 풍문을 눌러 둔다
