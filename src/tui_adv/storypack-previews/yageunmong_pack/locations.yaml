locations:
  - id: yageunmong_late_night_desk
    name: 야근 중 책상
    description: 모니터에 아직 같은 업무 창이 열려 있다. 시계는 같은 분을 반복하고, 메신저에는 시스템 알림이 깜빡인다.
    connections: [yageunmong_corridor]
    tags: [yageunmong, start, desk, late_night]
    danger: 0

  - id: yageunmong_corridor
    name: 야근 복도
    description: 불이 꺼진 복도 끝에 회의실 불빛만 새어 나온다. 복도를 걸으면 같은 자리로 돌아오는 느낌이 든다.
    connections: [yageunmong_late_night_desk, yageunmong_meeting_room, yageunmong_approval_desk, yageunmong_pantry, yageunmong_server_room, yageunmong_elevator]
    tags: [yageunmong, transit, loop]
    danger: 1

  - id: yageunmong_meeting_room
    name: 회의실 (루프)
    description: 불이 꺼지지 않는 회의실. 문을 닫고 나와도 다시 같은 회의실 앞이다. 회의록은 아직 말하지 않은 발언을 적고 있다.
    connections: [yageunmong_corridor]
    tags: [yageunmong, meeting_room, loop, nightmare]
    danger: 2

  - id: yageunmong_approval_desk
    name: 결재 책상
    description: 결재 화면이 꺼지지 않는 책상. 퇴근 요청은 반려를 반복하고, 조직도에는 주인공의 이름이 계속 복제된다.
    connections: [yageunmong_corridor, yageunmong_pantry]
    tags: [yageunmong, approval, authority, nightmare]
    danger: 2

  - id: yageunmong_pantry
    name: 탕비실
    description: 식은 커피 향이 남아 있는 탕비실. 프린터 위 문서에는 한 줄만 찍혀 있고, 멀리서 알람음 같은 소리가 들린다.
    connections: [yageunmong_corridor, yageunmong_approval_desk]
    tags: [yageunmong, pantry, anchor, sensory]
    danger: 1

  - id: yageunmong_server_room
    name: 서버룸
    description: 닫힌 프로젝트의 빌드 로그가 반복되는 서버룸. 실패 줄마다 이름이 붙지만 한 줄만 다른 말을 한다.
    connections: [yageunmong_corridor]
    tags: [yageunmong, server_room, dead_project, guilt]
    danger: 2

  - id: yageunmong_elevator
    name: 엘리베이터 (미승인층)
    description: 층수 표시가 B1, 13F, 0F, 미승인층, 퇴근층 사이를 번갈아 오간다. 닫힘 버튼은 작동하지 않는다.
    connections: [yageunmong_corridor, yageunmong_exit_gate]
    tags: [yageunmong, elevator, exit_hint, unapproved_floor]
    danger: 2

  - id: yageunmong_exit_gate
    name: 퇴근 게이트
    description: 출입 게이트 앞. 화면에는 `퇴근 승인 대기`가 깜빡인다. 뒤쪽 회의실에서는 아직도 이름을 부르는 소리가 들린다.
    connections: [yageunmong_elevator, yageunmong_corridor]
    tags: [yageunmong, exit_gate, route_split, ending]
    danger: 3
