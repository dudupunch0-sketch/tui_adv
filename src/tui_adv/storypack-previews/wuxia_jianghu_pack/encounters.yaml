encounters:
  - id: wuxia_commute_rift_arrival
    title: 출근길 균열
    body: 눈을 뜨자 출근복 차림 그대로 낯선 관도 한복판에 서 있다. 손에는 아직 사원증이 걸려 있고, 멀리서 청류문 수련생들의 발소리가 다가온다.
    presentation:
      visual_id: wuxia_commute_rift
      speaker: 천기록
      layout: storypack_preview
      effect_cues:
        - kind: glyph_anomaly
          source: commute_rift
          intensity: 0.58
          stable_terms: [사원증, 출근복, 천기록]
          distortion: hanja_then_badge_scan
          duration_hint_ms: 1400
          fallback_text: 한자 획 사이로 '사원증', '출근복', '천기록'만 현대식 글꼴처럼 남는다.
    conditions:
      locations: [wuxia_commute_rift]
    choices:
      - id: grip_employee_badge
        label: 사원증을 쥐고 현재의 나를 붙든다
        outcome:
          add_items: [commuter_badge]
          add_clues: [employee_badge_in_jianghu]
          add_flags: [wuxia_arrival_grounded]
          log: 사원증의 플라스틱 모서리가 손바닥에 남아, 이 몸이 아직 현대의 나임을 붙든다.
      - id: follow_roadside_dust
        label: 흙먼지가 흐르는 쪽으로 몸을 숨긴다
        outcome:
          destination_id: jianghu_roadside
          add_flags: [wuxia_arrival_hidden]
          log: 출근복 자락을 여미고 흙먼지의 흐름을 따라 관도 가장자리로 물러섰다.

  - id: wuxia_heuksa_bang_first_fight
    title: 흑사방 첫 난투
    body: 시장 입구에서 흑사방 말단들이 길을 막는다. “길을 막았으면 통행세를 내야지.” 목에 건 사원증을 값나가는 패처럼 바라보는 시선이 따라붙고, 몽둥이가 팔을 스치는 순간 이 세계의 폭력이 진짜라는 감각이 온몸에 박힌다.
    presentation:
      visual_id: wuxia_heuksa_bang_first_fight
      speaker: 흑사방 말단
      layout: combat_intervention
      effect_cues:
        - kind: glyph_anomaly
          source: market_brawl
          intensity: 0.66
          stable_terms: [거리, 구두, 사원증]
          distortion: dust_then_impact
          duration_hint_ms: 1200
          fallback_text: 흙먼지와 몽둥이 그림자 사이로 '거리', '구두', '사원증'만 또렷하게 남는다.
    conditions:
      locations: [jianghu_market_street]
      required_flags: [wuxia_arrival_hidden]
      forbidden_flags: [heuksa_bang_first_fight_resolved]
    choices:
      - id: run_toward_open_street
        label: 큰길 쪽으로 비틀거리며 물러난다
        outcome:
          resources:
            health: -3
          add_flags: [first_brawl_started, heuksa_bang_first_fight_resolved, first_brawl_survived]
          add_clues: [violence_is_real, open_street_escape_route]
          log: 도망은 영웅적이지 않았지만 큰 부상을 피했다. 흑사방이 길목을 어떻게 막는지도 보였다.
      - id: deescalate_with_words
        label: 말로 시간을 벌며 사원증을 감춘다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [first_brawl_started, heuksa_bang_first_fight_resolved, seo_harin_rescue_interest]
          add_clues: [badge_misread_as_sect_token, heuksa_bang_uses_toll_excuse]
          log: 말은 통했지만 세계관이 달랐다. 설득은 완전한 성공이 아니라 누군가 끼어들 시간을 버는 정도였다.
      - id: swing_commute_bag
        label: 출근 가방을 방패처럼 휘두른다
        outcome:
          resources:
            health: -6
          add_flags: [first_brawl_started, heuksa_bang_first_fight_resolved, commute_bag_damaged, brief_opening_created]
          add_clues: [office_items_can_block_once]
          log: 가방은 무기가 아니라 한 번의 완충재였다. 틈은 만들었지만 손잡이가 찢어지고 팔에는 통증이 남았다.
      - id: loosen_tie_and_drop_shoes
        label: 넥타이를 풀고 구두를 벗어 움직임을 회복한다
        outcome:
          resources:
            sanity: -1
          add_flags: [first_brawl_started, heuksa_bang_first_fight_resolved, mobility_recovered]
          add_clues: [shoes_and_suit_are_liability]
          log: 체면은 무너졌지만 발이 땅을 잡았다. 무공이 아니라 몸을 살리는 준비가 먼저였다.
      - id: crash_in_with_body
        label: 어깨로 들이받고 넘어지듯 버틴다
        outcome:
          resources:
            health: -10
          danger: 1
          add_flags: [first_brawl_started, heuksa_bang_first_fight_resolved, dirty_holdout_flag, heuksa_bang_attention]
          add_clues: [violence_is_real, crowd_now_watches_you]
          log: 잠깐 버티기는 했지만 무쌍은 아니었다. 손은 떨리고 셔츠는 찢어졌으며 더 큰 시선이 붙었다.

  - id: wuxia_cheonggi_record_first_fragment
    title: 천기록 첫 편린
    body: 난투가 지나간 시장 담벼락 아래, 업무수첩의 빈 장이 저절로 펼쳐진다. 먹물 같은 선이 번지더니 세 문장만 남는다. ‘호신 자세의 기본’, ‘발을 멈추지 않는 법’, ‘실패 기록’. 검색창도 보상창도 아니다. 지금은 하나의 방향만 붙들 수 있고, 나머지는 흐려진다.
    presentation:
      visual_id: wuxia_cheonggi_record_first_fragment
      speaker: 천기록
      layout: cheonggi_record
      effect_cues:
        - kind: glyph_anomaly
          source: notebook_oracle
          intensity: 0.71
          stable_terms: [업무수첩, 천기록, 실패 기록]
          distortion: ink_threads_then_three_phrases
          duration_hint_ms: 1500
          fallback_text: 업무수첩의 빈 줄 위에 '업무수첩', '천기록', '실패 기록'만 먹물처럼 또렷하게 남는다.
    conditions:
      locations: [jianghu_market_street]
      required_flags: [heuksa_bang_first_fight_resolved]
      forbidden_flags: [cheonggi_record_first_fragment_resolved]
    choices:
      - id: choose_guard_basics
        label: "'호신 자세의 기본' 문장을 붙든다"
        outcome:
          resources:
            sanity: -2
          add_items: [cheonggi_record_notebook]
          add_flags: [cheonggi_record_awakened, first_fragment_seen, cheonggi_record_first_fragment_resolved, cheonggi_fragment_guard_basics_thread]
          add_clues: [notebook_is_not_search, fragments_are_training_directions]
          log: 천기록은 방패를 주지 않았다. 대신 맞기 전에 팔과 턱을 어디에 둬야 하는지 복기할 숙제를 남겼다.
      - id: choose_keep_feet_moving
        label: "'발을 멈추지 않는 법'을 남긴다"
        outcome:
          resources:
            sanity: -2
          add_items: [cheonggi_record_notebook]
          add_flags: [cheonggi_record_awakened, first_fragment_seen, cheonggi_record_first_fragment_resolved, cheonggi_fragment_footwork_thread]
          add_clues: [fragments_are_training_directions, motion_matters_more_than_pose]
          log: 천기록은 무공 구결이 아니라 도망치며 넘어지지 않는 법을 남겼다. 자세보다 먼저 발이 멈추지 않아야 한다.
      - id: choose_failure_log
        label: "'실패 기록'을 받아들인다"
        outcome:
          resources:
            sanity: -3
          add_items: [cheonggi_record_notebook]
          add_flags: [cheonggi_record_awakened, first_fragment_seen, cheonggi_record_first_fragment_resolved, cheonggi_fragment_failure_log_thread]
          add_clues: [notebook_is_not_search, failures_can_be_training_material]
          log: 수첩은 승리담을 요구하지 않았다. 어디서 맞았고 왜 늦었는지 적는 순간, 실패가 다음 수련의 첫 줄이 되었다.
      - id: close_notebook_without_choice
        label: 수첩을 덮고 호흡부터 고른다
        outcome:
          resources:
            sanity: -1
          add_items: [cheonggi_record_notebook]
          add_flags: [cheonggi_record_awakened, first_fragment_seen, cheonggi_record_first_fragment_resolved, cheonggi_record_caution]
          add_clues: [notebook_is_not_search]
          log: 글자는 아직 사라지지 않았다. 답을 고르기 전에, 이것이 검색창도 즉시 성장도 아니라는 사실부터 받아들였다.

  - id: wuxia_seo_harin_rescue
    title: 서하린의 개입
    body: 시장 담벼락 아래에서 숨을 고르자 흑사방 말단들이 다시 다가온다. 그때 청류문 외문 제자 서하린이 군중을 가르며 끼어든다. 흑사방은 물러나지만 그녀도 주인공을 믿지는 않는다. “무공도 모르는 자가 흑사방을 건드렸다고? 그 옷차림과 수첩은 어느 세력의 표식이지?” 구조는 구원이 아니라 보호와 감시의 시작이다.
    presentation:
      visual_id: wuxia_seo_harin_rescue
      speaker: 서하린
      layout: rescue_and_investigation
      effect_cues:
        - kind: glyph_anomaly
          source: seo_harin_intervention
          intensity: 0.63
          stable_terms: [서하린, 청류문, 감시]
          distortion: sect_token_then_watchful_gaze
          duration_hint_ms: 1300
          fallback_text: 군중의 소음이 가라앉자 '서하린', '청류문', '감시'라는 말만 또렷하게 남는다.
    conditions:
      locations: [jianghu_market_street]
      required_flags: [heuksa_bang_first_fight_resolved, cheonggi_record_first_fragment_resolved]
      forbidden_flags: [seo_harin_rescue_resolved]
    choices:
      - id: tell_plain_truth
        label: 있는 그대로 길을 잃은 외지인이라고 말한다
        outcome:
          resources:
            sanity: -2
          add_flags: [seo_harin_rescue_resolved, seo_harin_intervened, taken_under_watch, outsider_claim_recorded, truthful_outsider_claim]
          add_clues: [cheongryu_name_heard, sect_identity_matters]
          destination_id: cheongryu_outer_courtyard
          log: 진실은 설득력이 낮지만 일관성은 있다. 서하린은 믿기보다 감시하기로 결정한다.
      - id: ask_for_medical_help_first
        label: 설명보다 치료와 안전한 곳을 먼저 부탁한다
        outcome:
          resources:
            health: 4
            sanity: -1
          add_flags: [seo_harin_rescue_resolved, seo_harin_intervened, taken_under_watch, outsider_claim_recorded, injury_stabilized, rescue_debt_recorded]
          add_clues: [cheongryu_medicine_smells_of_herbs, sect_protection_has_price]
          destination_id: cheongryu_outer_courtyard
          log: 상처는 임시로 묶이지만 목숨값과 치료비라는 단어가 따라붙는다.
      - id: explain_company_and_commute
        label: 회사와 출근길을 최대한 논리적으로 설명한다
        outcome:
          resources:
            sanity: -3
          add_flags: [seo_harin_rescue_resolved, seo_harin_intervened, taken_under_watch, outsider_claim_recorded, company_words_misunderstood]
          add_clues: [company_words_fail_clue, commute_rift_story_sounds_like_madness]
          destination_id: cheongryu_outer_courtyard
          log: 회사, 출근, 엘리베이터라는 말은 강호의 문법으로 번역되지 않는다. 기록할 말과 숨길 말이 갈라진다.
      - id: show_cheonggi_record_page
        label: 방금 떠오른 천기록의 글자를 조심스럽게 보여준다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [seo_harin_rescue_resolved, seo_harin_intervened, taken_under_watch, outsider_claim_recorded, seo_harin_noticed_cheonggi_record, cheonggi_record_must_be_hidden]
          add_clues: [notebook_draws_sect_attention, cheonggi_record_must_be_hidden]
          destination_id: cheongryu_outer_courtyard
          log: 수첩은 도움을 부를 수도 있지만, 이름 붙는 순간 표적이 될 수도 있다.
      - id: hide_employee_badge
        label: 사원증과 수첩을 품 안으로 숨긴다
        outcome:
          resources:
            sanity: -1
          danger: 1
          add_flags: [seo_harin_rescue_resolved, seo_harin_intervened, taken_under_watch, outsider_claim_recorded, badge_secret_flag, seo_harin_suspicion_raised]
          add_clues: [badge_misread_as_sect_token, hiding_marks_you_as_suspicious]
          destination_id: cheongryu_outer_courtyard
          log: 숨긴 물건은 지켜지지만, 숨기는 동작 자체가 의심을 산다.

  - id: wuxia_cheongryu_apprentice_entry
    title: 청류문 임시 수습생 등록
    body: 청류문 외곽 마당은 낡았지만 적대적이지 않다. 빈 연무장, 금 간 약탕기, 반쯤 무너진 서고 문이 이 문파의 적은 배신자가 아니라 결핍임을 말한다. 장문인은 서하린의 보고를 듣고 말한다. “보호는 하겠다. 다만 보호는 공짜가 아니고, 제자도 공짜로 받지 않는다. 석 달은 잡일과 수습으로 갚아라.”
    presentation:
      visual_id: wuxia_cheongryu_apprentice_entry
      speaker: 청류문 장문인
      layout: cheongryu_apprenticeship
      effect_cues:
        - kind: glyph_anomaly
          source: cheongryu_trial_roster
          intensity: 0.57
          stable_terms: [청류문, 잡일, 수습생]
          distortion: chore_roster_then_breath_flow
          duration_hint_ms: 1250
          fallback_text: 낡은 명부의 먹물 사이로 '청류문', '잡일', '수습생'만 천천히 떠오른다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [seo_harin_rescue_resolved, taken_under_watch]
      forbidden_flags: [cheongryu_apprentice_entry_resolved]
    choices:
      - id: accept_three_month_trial
        label: 석 달 동안 잡일과 수습 조건을 받아들인다
        outcome:
          resources:
            hunger: 1
            sanity: -1
          add_items: [work_chore_token]
          add_flags: [cheongryu_apprentice_entry_resolved, cheongryu_trial_started, seo_harin_mentor_thread, sect_debt_accepted, chore_training_open]
          add_clues: [training_starts_with_labor, protection_is_not_membership, sect_rules_written_in_chores]
          destination_id: cheongryu_outer_courtyard
          log: 보호는 소속의 문을 열지만 공짜가 아니다. 잡일은 벌이 아니라 청류문의 흐름을 배우는 첫 수련이 된다.
      - id: request_martial_training_immediately
        label: 지금 당장 무공을 가르쳐 달라고 요구한다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [cheongryu_apprentice_entry_resolved, cheongryu_trial_started, seo_harin_mentor_thread, training_request_denied, sect_rules_explained, sect_master_watch]
          add_clues: [training_requires_chore_credit, protection_is_not_membership]
          destination_id: cheongryu_outer_courtyard
          log: 청류심법은 동정으로 던져 주는 비급이 아니다. 장문인은 먼저 물 긷기와 호흡, 서 있는 법을 배우라고 못박는다.
      - id: organize_chores_like_workflow
        label: 회사식 업무 분해로 잡일 동선을 정리한다
        outcome:
          resources:
            sanity: -1
            hunger: 1
          add_flags: [cheongryu_apprentice_entry_resolved, cheongryu_trial_started, seo_harin_mentor_thread, modern_workflow_noticed, chore_roster_rewritten]
          add_clues: [workflow_thinking_translates_to_training, sect_rules_written_in_chores]
          destination_id: cheongryu_outer_courtyard
          log: 업무 분해와 동선 정리는 무공 치트가 아니다. 대신 청류문 사람들은 네가 흐름을 보는 방식에 처음으로 고개를 돌린다.
      - id: inspect_archive_during_chore
        label: 서고 정리 중 잠긴 낡은 장부를 살핀다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [cheongryu_apprentice_entry_resolved, cheongryu_trial_started, seo_harin_mentor_thread, old_archive_locked_seen, archive_curiosity_marked]
          add_clues: [old_archive_locked, cheonggi_record_resonates_near_archive]
          destination_id: cheongryu_outer_courtyard
          log: 잠긴 장부 앞에서 업무수첩의 빈 장이 아주 잠깐 떨린다. 천기록은 답하지 않고, 누군가 지켜보는 듯한 시선만 남긴다.

  - id: wuxia_cheongryu_chore_sparring
    title: 청류문 장작 마당 첫 겨루기
    body: 장작을 옮기던 중 외문 제자가 장난처럼 어깨를 밀어 온다. 정식 대련도, 무공 수업도 아니다. 그러나 장작 더미와 흙먼지 사이에서 몸이 밀리는 순간, 흑사방 난투와 물품창고에서 배운 거리와 균형이 같은 문법으로 겹친다.
    presentation:
      visual_id: wuxia_cheongryu_chore_sparring
      speaker: 서하린
      layout: combat_intervention
      effect_cues:
        - kind: glyph_anomaly
          source: cheongryu_chore_sparring
          intensity: 0.61
          stable_terms: [균형, 호흡, 장작]
          distortion: dust_balance_then_chore_roster
          duration_hint_ms: 1250
          fallback_text: 흙먼지와 장작 그림자 사이로 '균형', '호흡', '장작'만 또렷하게 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [cheongryu_apprentice_entry_resolved, cheongryu_trial_started, cheonggi_record_awakened, first_fragment_seen]
      forbidden_flags: [cheongryu_chore_sparring_resolved]
    choices:
      - id: step_back_with_firewood
        label: 장작을 떨어뜨리지 않고 반걸음 물러난다
        outcome:
          resources:
            hunger: 1
          add_flags: [cheongryu_chore_sparring_resolved, chore_sparring_completed, balance_training_noticed, office_combat_model_reused]
          add_clues: [balance_matters_more_than_force, office_items_can_translate_to_training]
          destination_id: cheongryu_outer_courtyard
          log: 장작은 검이 아니지만 균형을 무너뜨리는 무게가 된다. 반걸음 물러나는 선택은 도망이 아니라 다음 호흡을 남기는 개입이었다.
      - id: let_shoulder_turn_with_push
        label: 밀리는 힘을 거스르지 않고 어깨를 돌린다
        outcome:
          resources:
            sanity: -1
          add_flags: [cheongryu_chore_sparring_resolved, chore_sparring_completed, cheongryu_flow_reading_started, pressure_can_be_turned]
          add_clues: [breath_changes_balance, pressure_can_be_turned]
          destination_id: cheongryu_outer_courtyard
          log: 정면으로 버티지 않자 밀림이 회전으로 바뀌었다. 서하린은 그것을 초식이라 부르지 않고, 먼저 숨과 어깨의 방향이라고 설명했다.
      - id: plant_bare_foot_in_dust
        label: 흙먼지에 발을 박아 미끄러짐을 멈춘다
        outcome:
          resources:
            health: -1
          add_flags: [cheongryu_chore_sparring_resolved, chore_sparring_completed, footwork_training_grounded, shoes_and_suit_lessons_reused]
          add_clues: [posture_starts_from_ground, motion_matters_more_than_pose]
          destination_id: cheongryu_outer_courtyard
          log: 구두를 버렸던 첫 난투의 기억이 흙바닥에서 다시 쓰인다. 발이 멈추지 않되, 미끄러지지 않는 자리를 찾는 것이 첫 수련이 된다.
      - id: ask_harin_what_changed
        label: 방금 왜 덜 밀렸는지 서하린에게 묻는다
        outcome:
          resources:
            sanity: -1
          add_flags: [cheongryu_chore_sparring_resolved, chore_sparring_completed, seo_harin_mentor_thread, harin_names_balance_and_breath]
          add_clues: [mentor_explains_balance_breath, flow_axes_are_trainable]
          destination_id: cheongryu_outer_courtyard
          log: 서하린은 내공보다 먼저 균형, 호흡, 시야를 짚는다. 천기록의 빈 장은 그것이 office 난투와 같은 몸싸움의 축이라는 듯 조용히 떨린다.

  - id: wuxia_cheongryu_raid_route_split
    title: 청류문 습격과 갈라지는 길
    body: 밤 종이 세 번 울리기 전에 혈월교의 불화살이 청류문 외곽 마당을 가른다. 백도맹의 깃발은 늦게 보이고, 흑천련 도월은 탈출로의 값을 묻고, 천기각 기록관은 천기록이 표적이 됐다고 낮게 말한다. 서하린은 피 묻은 소매로 부상자를 막아 세운다. 어느 편도 완전히 선하거나 안전하지 않고, 선택하지 않는 것도 대가가 된다.
    presentation:
      visual_id: wuxia_cheongryu_raid_route_split
      speaker: 천기록
      layout: raid_route_pressure
      effect_cues:
        - kind: glyph_anomaly
          source: cheongryu_raid_route_pressure
          intensity: 0.74
          stable_terms: [청류문, 백도맹, 천기록]
          distortion: burning_courtyard_then_branching_routes
          duration_hint_ms: 1450
          fallback_text: 불길과 깃발, 먹물 선이 겹치는 사이로 '청류문', '백도맹', '천기록'만 흔들리지 않고 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [cheongryu_apprentice_entry_resolved, cheongryu_trial_started, cheonggi_record_awakened, first_fragment_seen, cheongryu_chore_sparring_resolved]
      forbidden_flags: [cheongryu_raid_route_split_resolved]
    choices:
      - id: evacuate_the_wounded_first
        label: 부상자를 먼저 빼내고 선택을 미룬다
        outcome:
          resources:
            health: -2
            sanity: -1
          danger: 1
          add_flags: [cheongryu_raid_route_split_resolved, cheongryu_raid_survived, route_commitment_pressure, route_commitment_deferred, wounded_saved_flag, seo_harin_survived_raid]
          add_clues: [saving_people_delays_route_choice, blood_moon_targets_cheonggi_record]
          destination_id: cheongryu_outer_courtyard
          log: 부상자를 업고 외곽 마당을 빠져나오자 route 선택은 늦춰졌다. 하지만 사람을 구한 선택도 하나의 선택이며, 천기록을 노린 칼끝은 사라지지 않았다.
      - id: defend_cheongryu_with_white_path
        label: 백도맹 지원을 받아 청류문을 방어한다
        outcome:
          resources:
            health: -5
            sanity: -2
          danger: 2
          add_flags: [cheongryu_raid_route_split_resolved, cheongryu_raid_survived, route_commitment_pressure, righteous_route_started, baekdo_alliance_debt, cheongryu_rebuild_thread, seo_harin_survived_raid]
          add_clues: [white_path_help_has_price, martial_knowledge_conflict]
          destination_id: cheongryu_outer_courtyard
          log: 백도맹의 검진은 마당을 지켰지만, 깃발 아래의 도움은 정치적 빚이 된다. 청류문은 살아남고, 천기록은 정파의 명분 안에 묶이기 시작한다.
      - id: trade_with_black_heaven
        label: 흑천련 도월과 거래해 탈출로를 산다
        outcome:
          resources:
            sanity: -3
            hunger: -1
          danger: 2
          add_flags: [cheongryu_raid_route_split_resolved, cheongryu_raid_survived, route_commitment_pressure, sapa_route_started, black_heaven_deal_marked, dowol_debt]
          add_clues: [black_heaven_bargain_has_teeth, martial_knowledge_conflict]
          destination_id: cheongryu_outer_courtyard
          log: 도월의 거래는 빠르고 실용적이었다. 살아남을 길은 열렸지만, 그 길의 매듭마다 흑천련의 이름과 갚아야 할 빚이 묶였다.
      - id: follow_heavenly_archive
        label: 천기각 기록관을 따라 천기록의 출처를 쫓는다
        outcome:
          resources:
            sanity: -4
          danger: 1
          add_flags: [cheongryu_raid_route_split_resolved, cheongryu_raid_survived, route_commitment_pressure, cheonggi_return_route_started, heavenly_archive_contact, cheonggi_record_targeted]
          add_clues: [heavenly_archive_knows_previous_outsiders, blood_moon_targets_cheonggi_record]
          destination_id: cheongryu_outer_courtyard
          log: 기록관은 정답을 말하지 않았다. 다만 이전에도 이곳에 떨어진 외지인이 있었다는 시선과, 천기록을 노리는 자들이 이제 너를 보았다는 사실만 남겼다.

  - id: wuxia_cheongryu_raid_wounded_fallback
    title: 부상자 피난처와 미뤄진 선택
    body: 날이 밝기 전, 청류문 외곽 마당에는 임시 피난처가 꾸려지고 숨을 고르는 사람들의 이름이 하나씩 불린다. 서하린은 피 묻은 소매를 감추지 못하고, 백도맹의 약상자는 문장 깃발 아래 놓여 있으며, 흑천련의 붕대는 값표가 붙은 듯하다. 천기록의 빈 장에는 부상자 동선이 지도처럼 번진다. 선택을 미뤘지만, 세계는 그 결정을 잊지 않았다.
    presentation:
      visual_id: wuxia_cheongryu_raid_wounded_fallback
      speaker: 천기록
      layout: wounded_fallback_route_pressure
      effect_cues:
        - kind: glyph_anomaly
          source: cheongryu_wounded_fallback
          intensity: 0.68
          stable_terms: [부상자, 백도맹, 천기각]
          distortion: roll_call_then_deferred_routes
          duration_hint_ms: 1400
          fallback_text: 부상자 명단의 먹줄 사이로 '부상자', '백도맹', '천기각'만 흔들리지 않고 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [cheongryu_raid_route_split_resolved, route_commitment_deferred, wounded_saved_flag, cheongryu_raid_survived]
      forbidden_flags: [cheongryu_raid_wounded_fallback_resolved]
    choices:
      - id: stabilize_wounded_until_dawn
        label: 새벽까지 부상자를 안정시키고 명단을 맞춘다
        outcome:
          resources:
            health: -1
            hunger: 1
          add_flags: [cheongryu_raid_wounded_fallback_resolved, deferred_route_reopened, route_commitment_deferred, wounded_shelter_stabilized, survivor_roll_call_complete, route_delay_cost_recorded]
          add_clues: [saving_people_changed_witnesses, deferred_choice_is_still_choice]
          destination_id: cheongryu_outer_courtyard
          log: 사람을 먼저 구한 선택은 신뢰를 만들었다. 그러나 route pressure는 사라지지 않고, 더 구체적인 대가와 다음 선택지로 돌아왔다.
      - id: ask_baekdo_for_medicine_not_command
        label: 백도맹에 명령이 아니라 약과 호위를 요청한다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [cheongryu_raid_wounded_fallback_resolved, deferred_route_reopened, righteous_route_started, baekdo_medicine_debt, cheongryu_rebuild_thread]
          add_clues: [medicine_has_banner, white_path_help_has_price]
          destination_id: cheongryu_outer_courtyard
          log: 백도맹의 약상자는 사람을 살리지만, 깃발 아래 놓인 도움은 정치적 빚을 남긴다. 늦은 선택도 정파 route의 이름을 갖기 시작했다.
      - id: trade_black_heaven_bandages_for_exit
        label: 흑천련의 붕대와 탈출로를 거래한다
        outcome:
          resources:
            sanity: -3
            hunger: -1
          danger: 1
          add_flags: [cheongryu_raid_wounded_fallback_resolved, deferred_route_reopened, sapa_route_started, black_heaven_escape_marker, dowol_debt]
          add_clues: [black_heaven_help_marks_debt, black_heaven_bargain_has_teeth]
          destination_id: cheongryu_outer_courtyard
          log: 사파의 도움은 빠르고 실용적이다. 붕대 매듭마다 갚아야 할 이름이 묶이고, 미뤄 둔 route 선택은 거래의 형태로 다시 열린다.
      - id: follow_archive_triage_map
        label: 천기각 기록관의 부상자 동선 지도를 따른다
        outcome:
          resources:
            sanity: -3
          danger: 1
          add_flags: [cheongryu_raid_wounded_fallback_resolved, deferred_route_reopened, cheonggi_return_route_started, heavenly_archive_triage_map_seen, cheonggi_record_targeted]
          add_clues: [archive_records_count_the_living, heavenly_archive_knows_previous_outsiders]
          destination_id: cheongryu_outer_courtyard
          log: 천기각의 지도는 산 사람의 동선을 세지만, 그 선은 주인공이 돌아갈 수 있는 균열과도 이어진다. 기록자는 정체를 드러내지 않고 시선만 남긴다.

  - id: wuxia_baekdo_medicine_debt
    title: 백도맹 약상자와 청류문의 채무
    body: 새벽빛이 청류문 외곽 마당에 내려앉을 때, 백도맹 깃발을 단 약상자가 산문 앞에 놓인다. 남궁서윤은 사람을 살릴 수 있는 약과 호위를 내밀지만, 그 뒤에는 지원 명부와 채무 문서가 함께 접혀 있다. 도움은 분명 사람을 살린다. 다만 그 도움은 누구의 이름으로 기록되는지 묻는다.
    presentation:
      visual_id: wuxia_baekdo_medicine_debt
      speaker: 남궁서윤
      layout: righteous_route_opener
      effect_cues:
        - kind: glyph_anomaly
          source: baekdo_medicine_debt
          intensity: 0.69
          stable_terms: [약상자, 백도맹, 채무]
          distortion: medicine_chest_then_written_debt
          duration_hint_ms: 1400
          fallback_text: 약 냄새와 깃발 그림자 사이로 '약상자', '백도맹', '채무'만 선명하게 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [righteous_route_started, cheongryu_rebuild_thread]
      forbidden_flags: [baekdo_medicine_debt_resolved]
    choices:
      - id: accept_medicine_with_written_debt
        label: 채무 문서를 남기고 약상자와 호위를 받는다
        outcome:
          resources:
            health: 5
            sanity: -2
          add_flags: [baekdo_medicine_debt_resolved, righteous_route_opened, route_opener_resolved, white_path_debt_recorded, cheongryu_rebuild_supplies_secured, namgung_seoyun_notice]
          add_clues: [medicine_has_banner, white_path_help_has_price, qingliu_survival_needs_outside_help]
          destination_id: cheongryu_outer_courtyard
          log: 약상자는 사람을 살리고, 문서는 청류문의 이름 옆에 백도맹의 채무를 남긴다. 도움은 따뜻하지만 기록은 차갑다.
      - id: ask_terms_before_opening_gate
        label: 산문을 열기 전에 백도맹의 조건을 묻는다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [baekdo_medicine_debt_resolved, righteous_route_opened, route_opener_resolved, baekdo_terms_questioned, white_path_debt_recorded, namgung_seoyun_notice]
          add_clues: [white_path_help_has_price, order_can_save_and_bind]
          destination_id: cheongryu_outer_courtyard
          log: 조건을 묻자 남궁서윤의 눈빛이 잠깐 굳는다. 정의는 사람을 살릴 수 있지만, 질서는 누가 누구에게 빚졌는지도 함께 적는다.
      - id: send_supplies_to_wounded_first
        label: 약과 식량을 장문 명부보다 부상자에게 먼저 돌린다
        outcome:
          resources:
            health: 4
            hunger: -1
            sanity: -1
          add_flags: [baekdo_medicine_debt_resolved, righteous_route_opened, route_opener_resolved, cheongryu_people_first, seo_harin_respect_thread, cheongryu_rebuild_supplies_secured]
          add_clues: [qingliu_survival_needs_outside_help, order_can_save_and_bind]
          destination_id: cheongryu_outer_courtyard
          log: 명부보다 먼저 부상자의 손에 약이 닿는다. 서하린은 아무 말 없이 고개를 끄덕이고, 백도맹 사자는 그 순서를 오래 바라본다.
      - id: compare_banner_to_record_margin
        label: 백도맹 깃발과 천기록 여백의 문장을 비교한다
        outcome:
          resources:
            sanity: -3
          danger: 1
          add_flags: [baekdo_medicine_debt_resolved, righteous_route_opened, route_opener_resolved, cheonggi_record_notes_baekdo_debt, white_path_debt_recorded]
          add_clues: [record_counts_debt_not_justice, white_path_help_has_price]
          destination_id: cheongryu_outer_courtyard
          log: 천기록의 여백은 답하지 않는다. 다만 깃발의 의와 문서의 채무가 같은 먹으로 기록될 수 있다는 사실만 남긴다.

  - id: wuxia_black_heaven_escape_price
    title: 흑천련 탈출로의 값
    body: 청류문 바깥 담장 너머 시장 골목에서 도월이 낡은 흑천련 표식을 굴린다. “흑천련 길은 빠르다. 공짜가 아닐 뿐이지.” 붕대와 탈출로는 사람을 살릴 수 있지만, 누가 값을 받을지와 누구의 이름이 장부에 남을지는 아직 정해지지 않았다.
    presentation:
      visual_id: wuxia_black_heaven_escape_price
      speaker: 도월
      layout: sapa_route_opener
      effect_cues:
        - kind: glyph_anomaly
          source: black_heaven_escape_price
          intensity: 0.7
          stable_terms: [탈출로, 흑천련, 값]
          distortion: alley_marker_then_ledger_lines
          duration_hint_ms: 1400
          fallback_text: 어두운 골목과 낡은 표식 사이로 '탈출로', '흑천련', '값'만 선명하게 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [sapa_route_started, dowol_debt]
      forbidden_flags: [black_heaven_escape_price_resolved]
    choices:
      - id: accept_dowol_marker_for_safehouse
        label: 도월의 표식을 받고 임시 은신처와 탈출로를 얻는다
        outcome:
          resources:
            sanity: -2
            hunger: -1
          danger: 1
          add_flags: [black_heaven_escape_price_resolved, sapa_route_opened, route_opener_resolved, black_heaven_safehouse_marked, market_route_debt_recorded]
          add_clues: [black_heaven_help_marks_debt, survival_bargain_is_not_loyalty]
          destination_id: cheongryu_outer_courtyard
          log: 흑천련의 길은 빠르고 실제적이다. 표식 하나가 임시 은신처를 열지만, 그 표식은 나중에 값을 받을 증거로도 남는다.
      - id: ask_who_collects_the_price
        label: 누가 언제 어떤 방식으로 값을 받는지 먼저 묻는다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [black_heaven_escape_price_resolved, sapa_route_opened, route_opener_resolved, dowol_terms_questioned]
          add_clues: [black_heaven_bargain_has_teeth, survival_bargain_is_not_loyalty]
          destination_id: cheongryu_outer_courtyard
          log: 조건을 묻자 도월은 웃는다. 사파의 도움은 자비가 아니라 거래이고, 거래는 늘 받아 갈 손을 함께 데려온다.
      - id: keep_cheongryu_names_off_ledger
        label: 청류문 사람들의 이름은 흑천련 장부에 남기지 않는다
        outcome:
          resources:
            sanity: -2
          danger: 2
          add_flags: [black_heaven_escape_price_resolved, sapa_route_opened, route_opener_resolved, cheongryu_names_kept_off_ledger, market_route_debt_recorded]
          add_clues: [ledger_can_be_bent_not_broken, sapa_can_save_without_mercy]
          destination_id: cheongryu_outer_courtyard
          log: 청류문의 이름을 지우는 대신, 당신의 이름이 더 굵은 획으로 남는다. 도월은 그 고집을 어리석음이 아니라 쓸 만한 값으로 본다.
      - id: map_exit_before_following_dowol
        label: 따라가기 전에 탈출로와 추적선을 먼저 기록한다
        outcome:
          resources:
            health: -1
            sanity: -1
          add_flags: [black_heaven_escape_price_resolved, sapa_route_opened, route_opener_resolved, sapa_survival_principle_seen]
          add_clues: [sapa_can_save_without_mercy, black_heaven_bargain_has_teeth]
          destination_id: cheongryu_outer_courtyard
          log: 흑천련의 길은 사람을 살릴 수 있다. 다만 살아남은 사람이 어디로 빚을 갚으러 갈지도 함께 보여준다.

  - id: wuxia_heavenly_archive_previous_outsiders
    title: 천기각 이전 이방인 기록
    body: 청류문 마당의 먼지가 가라앉자 연소하가 낡은 서책 한 권을 펼친다. 표지에는 천기각의 인장이 있고, 여백에는 낯선 옷차림과 끊긴 길을 묘사한 문장이 남아 있다. 답은 없지만, 당신만 처음 온 사람은 아니라는 사실은 분명하다.
    presentation:
      visual_id: wuxia_heavenly_archive_previous_outsiders
      speaker: 연소하
      layout: cheonggi_return_opener
      effect_cues:
        - kind: glyph_anomaly
          source: heavenly_archive_previous_outsiders
          intensity: 0.72
          stable_terms: [천기각, 이방인, 균열]
          distortion: archive_margins_then_worldline_fold
          duration_hint_ms: 1450
          fallback_text: 낡은 서책의 여백과 접힌 먹선 사이로 '천기각', '이방인', '균열'만 선명하게 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [cheonggi_return_route_started, cheonggi_record_targeted]
      forbidden_flags: [heavenly_archive_previous_outsiders_resolved]
    choices:
      - id: read_previous_outsider_margins
        label: 이전 이방인의 여백 기록을 조용히 읽는다
        outcome:
          resources:
            sanity: -2
          add_flags: [heavenly_archive_previous_outsiders_resolved, cheonggi_return_route_opened, route_opener_resolved, previous_outsiders_record_seen]
          add_clues: [archive_has_other_outsiders, return_clue_is_not_return_method]
          destination_id: cheongryu_outer_courtyard
          log: 서고의 여백에는 돌아간 사람보다 사라진 길을 붙잡은 사람의 흔적이 더 많다. 천기각은 방법이 아니라 흔적부터 보여준다.
      - id: ask_yeon_soha_what_not_to_read
        label: 연소하에게 무엇을 읽으면 안 되는지 먼저 묻는다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [heavenly_archive_previous_outsiders_resolved, cheonggi_return_route_opened, route_opener_resolved, yeon_soha_warning_heard]
          add_clues: [cheonggi_record_refuses_identity_answer, record_gaze_without_name]
          destination_id: cheongryu_outer_courtyard
          log: 연소하는 답을 숨기지 않는다. 다만 답으로 변하는 질문을 먼저 막는다. 기록자는 이름 대신 시선만 남긴다.
      - id: mark_current_worldline_without_answer
        label: 정답을 요구하지 않고 현재 세계선의 흔적만 표시한다
        outcome:
          resources:
            sanity: -1
          add_flags: [heavenly_archive_previous_outsiders_resolved, cheonggi_return_route_opened, route_opener_resolved, worldline_margin_marked]
          add_clues: [worldline_gaps_have_patterns, cheonggi_record_refuses_identity_answer]
          destination_id: cheongryu_outer_courtyard
          log: 천기록은 세계의 이름을 쓰지 않는다. 대신 이 세계선의 접힌 자국 하나를 여백에 남긴다.
      - id: compare_rift_terms_to_commute_memory
        label: 서고의 균열 용어를 출근길 기억과 비교한다
        outcome:
          resources:
            sanity: -3
            health: -1
          add_flags: [heavenly_archive_previous_outsiders_resolved, cheonggi_return_route_opened, route_opener_resolved, commute_rift_terms_compared]
          add_clues: [worldline_gaps_have_patterns, return_clue_is_not_return_method, record_gaze_without_name]
          destination_id: cheongryu_outer_courtyard
          log: 출근길의 문틈과 서고의 균열이라는 말이 같은 모양으로 접힌다. 하지만 접힌 모양은 문이 아니다.

  - id: wuxia_wounded_shelter_dawn_offers
    title: 부상자 피난처의 새벽 제안
    body: 새벽이 오자 임시 피난처의 숨소리가 하나씩 안정된다. 서하린은 젖은 천을 갈아 묶으며 부상자 명단을 접는다. 문밖에는 남궁서윤의 약상자, 도월이 남긴 짧은 전서, 연소하의 접힌 지도 조각이 서로 다른 그림자처럼 도착해 있다. 사람을 살리느라 선택을 미뤘지만, 그 덕분에 다시 물을 수 있는 이름들이 남았다.
    presentation:
      visual_id: wuxia_wounded_shelter_dawn_offers
      speaker: 서하린
      layout: deferred_route_offer
      effect_cues:
        - kind: glyph_anomaly
          source: wounded_shelter_dawn_offers
          intensity: 0.67
          stable_terms: [새벽, 부상자, 제안]
          distortion: roll_call_then_three_offers
          duration_hint_ms: 1400
          fallback_text: 부상자 명단과 접힌 전서 사이로 '새벽', '부상자', '제안'만 흔들리지 않고 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [cheongryu_raid_wounded_fallback_resolved, route_commitment_deferred, deferred_route_reopened, wounded_shelter_stabilized]
      forbidden_flags: [wounded_shelter_dawn_offers_resolved]
    choices:
      - id: keep_wounded_shelter_until_noon
        label: 정오까지 피난처를 더 지킨다
        outcome:
          resources:
            health: -1
            hunger: 1
          danger: 1
          add_flags: [wounded_shelter_dawn_offers_resolved, route_commitment_reopened, wounded_shelter_until_noon, deferred_offer_debt_recorded]
          add_clues: [saving_people_changed_witnesses, care_is_not_route_escape, dawn_shelter_keeps_names]
          destination_id: cheongryu_outer_courtyard
          log: route를 고르지 않는 대신 살아남은 이름들이 더 또렷해진다. 피난처는 도망이 아니지만, 사람을 살린 증거는 다음 선택의 무게가 된다.
      - id: accept_baekdo_medicine_after_roll_call
        label: 생존자 점호 뒤 백도맹 약상자를 받는다
        outcome:
          resources:
            sanity: -2
            health: 3
          add_flags: [wounded_shelter_dawn_offers_resolved, route_commitment_reopened, righteous_route_started, cheongryu_rebuild_thread, baekdo_medicine_debt]
          add_clues: [offers_arrive_because_people_lived, delayed_choice_has_callers, medicine_has_banner]
          destination_id: cheongryu_outer_courtyard
          log: 약상자는 명령서가 아니라 명단 위에 놓인다. 빚은 생겼지만 문은 다시 열리고, 정파의 제안은 살아남은 사람들의 숨 위에 놓인다.
      - id: send_word_to_dowol_for_quiet_exit
        label: 도월에게 조용한 퇴로를 부탁한다
        outcome:
          resources:
            sanity: -2
            hunger: -1
          danger: 1
          add_flags: [wounded_shelter_dawn_offers_resolved, route_commitment_reopened, sapa_route_started, dowol_debt, black_heaven_escape_marker]
          add_clues: [delayed_choice_has_callers, care_is_not_route_escape, black_heaven_help_marks_debt]
          destination_id: cheongryu_outer_courtyard
          log: 도월의 답장은 짧다. 사람을 살린 일에도 값은 붙지만, 값이 붙는다고 모두 거래가 되는 것은 아니다.
      - id: show_archive_map_to_yeon_soha
        label: 연소하에게 피난처 지도의 접힌 부분을 보인다
        outcome:
          resources:
            sanity: -3
          danger: 1
          add_flags: [wounded_shelter_dawn_offers_resolved, route_commitment_reopened, cheonggi_return_route_started, cheonggi_record_targeted, heavenly_archive_triage_map_seen]
          add_clues: [dawn_shelter_keeps_names, delayed_choice_has_callers, offers_arrive_because_people_lived]
          destination_id: cheongryu_outer_courtyard
          log: 지도는 길보다 먼저 이름을 기억한다. 연소하는 그 순서가 중요하다고 말하고, 천기록은 여전히 정답 대신 접힌 선만 남긴다.

  - id: wuxia_mumyeong_first_sighting
    title: 무명 첫 목격
    body: 청류문 외원 담장 너머로 흑사방 심부름꾼 하나가 지나간다. 걸음은 거칠지만 팔꿈치가 꺾이는 순간, 장작 마당에서 배운 청류문식 흐름과 너무 닮은 선이 스친다. 그러나 그 흐름은 맑지 않고, 다른 문파의 초식이 덧씌워진 듯 비어 있다. 서하린은 이름을 부르려다 멈추고, 그자는 뒤돌아보지 않은 채 어둠 속으로 사라진다.
    presentation:
      visual_id: wuxia_mumyeong_first_sighting
      speaker: 서하린
      layout: midgame_rival_sighting
      effect_cues:
        - kind: glyph_anomaly
          source: mumyeong_first_sighting
          intensity: 0.73
          stable_terms: [무명, 청류문, 흑사방]
          distortion: borrowed_form_then_missing_center
          duration_hint_ms: 1450
          fallback_text: 담장 그림자와 낯익은 보법 사이로 '무명', '청류문', '흑사방'만 흔들리지 않고 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [route_opener_resolved, cheongryu_raid_survived, cheongryu_trial_started, first_fragment_seen]
      forbidden_flags: [mumyeong_first_sighting_resolved]
    choices:
      - id: watch_the_stolen_qingliu_flow
        label: 훔쳐 쓴 청류문식 흐름을 끝까지 관찰한다
        outcome:
          resources:
            sanity: -2
          add_flags: [mumyeong_first_sighting_resolved, midgame_continuity_started, mumyeong_shadow_seen, copied_qingliu_flow_noted]
          add_clues: [mumyeong_exists, copied_flow_is_not_qingliu]
          destination_id: cheongryu_outer_courtyard
          log: 닮았지만 중심이 다르다. 청류문식의 모양은 있으나 흐름을 이해한 흔적은 없고, 훔친 초식이 몸 위에 덧칠처럼 남아 있다.
      - id: check_seo_harin_silence
        label: 서하린이 이름을 삼키는 순간을 본다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [mumyeong_first_sighting_resolved, midgame_continuity_started, seo_harin_recognized_mumyeong, mumyeong_wound_thread_opened]
          add_clues: [seo_harin_does_not_call_him_traitor, mumyeong_exists]
          destination_id: cheongryu_outer_courtyard
          log: 서하린은 배신자라는 말을 쓰지 않는다. 그 침묵이 이름보다 먼저 상처를 드러내고, 아직 묻지 못한 과거를 남긴다.
      - id: follow_black_serpent_runner
        label: 흑사방 심부름꾼의 뒤를 짧게 쫓는다
        outcome:
          resources:
            health: -1
            sanity: -2
          danger: 2
          add_flags: [mumyeong_first_sighting_resolved, midgame_continuity_started, black_serpent_trail_marked, mumyeong_pursuit_risk]
          add_clues: [black_serpent_uses_borrowed_flows, copied_flow_is_not_qingliu]
          destination_id: cheongryu_outer_courtyard
          log: 뒤를 밟는 데는 성공하지만, 흑사방은 일부러 발자국을 남기는 법도 안다. 쫓는 순간부터 이쪽도 관찰당한다.
      - id: pretend_not_to_see_the_form
        label: 못 본 척하고 외원 순찰을 계속한다
        outcome:
          resources:
            sanity: -1
          add_flags: [mumyeong_first_sighting_resolved, midgame_continuity_started, mumyeong_clue_deferred, unresolved_rival_debt]
          add_clues: [not_seeing_is_also_a_choice, black_serpent_uses_borrowed_flows]
          destination_id: cheongryu_outer_courtyard
          log: 모른 척한 일도 사라지지 않는다. 다음에 같은 흐름을 보면 더 늦게 알아볼 뿐이고, 늦게 알아본 대가는 언젠가 돌아온다.

  - id: wuxia_mumyeong_first_confrontation
    title: 무명 첫 대치
    body: 외원 담장 밑에서 다시 그 흐름이 나타난다. 무명은 청류문이 또 외부자를 주워 왔느냐고 묻지만, 말끝에는 조롱보다 피로가 먼저 묻어난다. 서하린은 칼집에 손을 얹고도 이름을 부르지 않는다. 무명의 발끝이 반 보 앞으로 밀려오고, 훔친 청류문식 초식이 비어 있는 중심 위에 번쩍인다.
    presentation:
      visual_id: wuxia_mumyeong_first_confrontation
      speaker: 무명
      layout: rival_first_confrontation
      effect_cues:
        - kind: glyph_anomaly
          source: mumyeong_first_confrontation
          intensity: 0.78
          stable_terms: [무명, 서하린, 청류문]
          distortion: copied_flow_breaks_under_pressure
          duration_hint_ms: 1500
          fallback_text: 부딪히는 보법 사이로 '무명', '서하린', '청류문'만 흔들리지 않고 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [mumyeong_first_sighting_resolved, midgame_continuity_started, cheongryu_raid_survived, first_fragment_seen]
      forbidden_flags: [mumyeong_first_confrontation_resolved]
    choices:
      - id: meet_mumyeong_head_on
        label: 무명과 정면으로 맞선다
        outcome:
          resources:
            health: -2
            sanity: -2
          danger: 2
          add_flags: [mumyeong_first_confrontation_resolved, mumyeong_rival_thread_opened, rival_endured_not_defeated]
          add_clues: [mumyeong_is_not_boss_wall, winning_is_not_required]
          destination_id: cheongryu_outer_courtyard
          log: 정면으로 부딪혔지만 이긴 것은 아니다. 다만 물러서지 않았다는 사실만은 남고, 무명은 그 사실을 기억한다.
      - id: endure_until_copy_flow_breaks
        label: 버티며 카피한 흐름이 끊기는 순간을 기다린다
        outcome:
          resources:
            health: -1
            sanity: -2
          danger: 1
          add_flags: [mumyeong_first_confrontation_resolved, mumyeong_rival_thread_opened, copied_flow_weakness_noted]
          add_clues: [copy_style_has_gap, copied_flow_is_not_qingliu]
          destination_id: cheongryu_outer_courtyard
          log: 훔친 흐름은 빠르지만 오래 가지 않는다. 중심이 돌아오는 순간, 청류문식 모양 아래 비어 있던 틈이 드러난다.
      - id: watch_seo_harin_hold_back
        label: 서하린이 왜 끼어들지 않는지 살핀다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [mumyeong_first_confrontation_resolved, mumyeong_rival_thread_opened, seo_harin_mumyeong_silence_confirmed]
          add_clues: [seo_harin_does_not_call_him_traitor, mumyeong_was_not_only_enemy]
          destination_id: cheongryu_outer_courtyard
          log: 서하린은 끼어들 수 있는데도 한 박자 늦춘다. 그 침묵은 망설임이 아니라, 아직 끊어내지 못한 기억에 가깝다.
      - id: read_mumyeongs_copied_form
        label: 무명의 초식이 어디서 어긋나는지 읽는다
        outcome:
          resources:
            sanity: -3
          danger: 1
          add_flags: [mumyeong_first_confrontation_resolved, mumyeong_rival_thread_opened, copied_flow_weakness_noted, cheonggi_copy_contrast_noted]
          add_clues: [copy_style_has_gap, understanding_is_not_copying]
          destination_id: cheongryu_outer_courtyard
          log: 같은 선을 그어도 같은 뜻이 되지는 않는다. 훔친 초식과 이해한 흐름은 손끝에서 갈라지고, 천기록의 빈 줄은 그 차이를 조용히 적어 둔다.
      - id: do_not_provoke_mumyeong
        label: 도발하지 않고 물러설 거리를 만든다
        outcome:
          resources:
            sanity: -1
          add_flags: [mumyeong_first_confrontation_resolved, mumyeong_rival_thread_opened, rivalry_deferred_not_avoided]
          add_clues: [winning_is_not_required, not_provoking_still_leaves_debt]
          destination_id: cheongryu_outer_courtyard
          log: 싸움을 키우지 않는다고 대치가 사라지지는 않는다. 오늘 피한 말은 다음에 더 날카롭게 돌아오고, 무명은 네가 물러선 거리를 기억한다.

  - id: wuxia_mumyeong_copy_style_reveal
    title: 무명의 카피 무공 공개
    body: 첫 대치가 끝난 뒤에도 무명의 움직임은 눈꺼풀 안쪽에 남아 있다. 같은 청류문식처럼 보였던 선은 어느 순간 검로처럼 꺾이고, 어느 순간 보법처럼 미끄러지며, 호흡이 어긋나는 짧은 틈마다 몸에 맞지 않는 초식의 반동을 드러낸다.
    presentation:
      visual_id: wuxia_mumyeong_copy_style_reveal
      speaker: 서하린
      layout: copy_style_analysis
      effect_cues:
        - kind: glyph_anomaly
          source: mumyeong_copy_style_reveal
          intensity: 0.76
          stable_terms: [무명, 청류안, 천기록]
          distortion: copied_style_then_breath_mismatch
          duration_hint_ms: 1450
          fallback_text: 흩어지는 검로와 어긋난 호흡 사이로 '무명', '청류안', '천기록'만 흔들리지 않고 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [mumyeong_first_confrontation_resolved, mumyeong_rival_thread_opened, midgame_continuity_started]
      forbidden_flags: [mumyeong_copy_style_reveal_resolved]
    choices:
      - id: read_the_stolen_blade_path
        label: 훔쳐 쓴 검로가 어디서 꺾이는지 읽는다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [mumyeong_copy_style_reveal_resolved, copy_style_hint_recorded, copied_blade_path_noted]
          add_clues: [copied_form_family_seen, copy_is_surface_not_root]
          destination_id: cheongryu_outer_courtyard
          log: 검로처럼 보이지만 칼끝의 뜻이 이어지지 않는다. 훔친 것은 선이지 중심이 아니며, 무명의 손목은 늦게 반동을 받는다.
      - id: watch_mumyeongs_footwork
        label: 무명의 보법이 땅을 밀어내는 방식을 본다
        outcome:
          resources:
            sanity: -2
          add_flags: [mumyeong_copy_style_reveal_resolved, copy_style_hint_recorded, copied_footwork_noted]
          add_clues: [copied_form_family_seen, footwork_without_root_wobbles]
          destination_id: cheongryu_outer_courtyard
          log: 발은 빠르지만 땅을 믿지 않는다. 남의 보법을 얹은 몸은 한 박자 늦게 흔들리고, 그 흔들림이 카피의 경계를 그린다.
      - id: listen_for_breath_mismatch
        label: 거리를 두고 호흡이 어긋나는 박자를 듣는다
        outcome:
          resources:
            sanity: -1
          add_flags: [mumyeong_copy_style_reveal_resolved, copy_style_hint_recorded, copied_breath_mismatch_noted]
          add_clues: [breath_mismatch_marks_copy, understanding_is_not_copying]
          destination_id: cheongryu_outer_courtyard
          log: 초식은 따라왔지만 숨은 따라오지 못한다. 그 박자가 청류안에 먼저 걸리고, 천기록은 이해와 복사가 다르다는 문장만 남긴다.
      - id: wait_for_body_to_shudder
        label: 몸에 맞지 않는 초식이 반동을 내는 순간까지 기다린다
        outcome:
          resources:
            health: -1
            sanity: -2
          danger: 1
          add_flags: [mumyeong_copy_style_reveal_resolved, copy_style_hint_recorded, copy_side_effect_seen]
          add_clues: [copy_is_surface_not_root, fragment_candidate_variation_foreshadowed]
          destination_id: cheongryu_outer_courtyard
          log: 무명의 어깨가 아주 짧게 떨린다. 천기록의 빈 줄은 아직 보상을 주지 않지만, 다음 편린의 모양을 기억한다.

  - id: wuxia_mumyeong_reads_orthodox_style
    title: 무명의 정파 무공 간파
    body: 무명의 카피는 완전한 복사가 아니었다. 겉흐름 사이로 손목을 잠그는 각도, 기혈을 누르는 순서, 물러나는 보폭이 삐져나온다. 천기록의 빈 줄은 그 흔적을 현악문과 복호금쇄수라는 이름 옆에 잠시 멈춰 세운다.
    presentation:
      visual_id: wuxia_mumyeong_reads_orthodox_style
      speaker: 천기록
      layout: orthodox_style_trace
      effect_cues:
        - kind: glyph_anomaly
          source: mumyeong_reads_orthodox_style
          intensity: 0.73
          stable_terms: [현악문, 복호금쇄수, 무명]
          distortion: orthodox_trace_over_copied_form
          duration_hint_ms: 1500
          fallback_text: 낡은 초식의 선이 접히고, '현악문', '복호금쇄수', '무명'만 먹물처럼 또렷하게 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [mumyeong_copy_style_reveal_resolved, copy_style_hint_recorded, midgame_continuity_started, first_fragment_seen]
      forbidden_flags: [mumyeong_reads_orthodox_style_resolved]
    choices:
      - id: compare_copied_form_to_old_wound
        label: 카피된 초식과 오래된 상처의 각도를 맞춰 본다
        outcome:
          resources:
            sanity: -2
          add_flags: [mumyeong_reads_orthodox_style_resolved, orthodox_style_trace_recorded, old_wound_angle_compared]
          add_clues: [hyeonakmun_trace_suspected, orthodox_control_is_violence]
          destination_id: cheongryu_outer_courtyard
          log: 손목을 잠그는 각도는 살수의 버릇이 아니라 정파식 통제의 흔적에 가깝다. 현악문이라는 이름이 천기록의 여백에 얇게 걸린다.
      - id: trace_qingliu_eye_variation
        label: 청류안 계열의 시선이 어디서 비틀렸는지 추적한다
        outcome:
          resources:
            sanity: -2
          add_flags: [mumyeong_reads_orthodox_style_resolved, orthodox_style_trace_recorded, qingliu_eye_variation_traced]
          add_clues: [mumyeong_eye_variation_noted, copy_is_surface_not_root]
          destination_id: cheongryu_outer_courtyard
          log: 무명은 흐름을 본 뒤 훔쳤고, 너는 흐름을 본 뒤 맞춰 보려 한다. 같은 눈에서 다른 결론이 갈라진다.
      - id: reconstruct_mumyeongs_sightline
        label: 무명이 그날 보았을 시선을 따라 재구성한다
        outcome:
          resources:
            sanity: -3
          danger: 1
          add_flags: [mumyeong_reads_orthodox_style_resolved, orthodox_style_trace_recorded, mumyeong_sightline_reconstructed]
          add_clues: [bokho_geumsaesu_name_recorded, departure_truth_still_incomplete]
          destination_id: cheongryu_outer_courtyard
          log: 복호금쇄수라는 이름은 떠오르지만, 그 이름이 왜 무명을 청류문 밖으로 밀어냈는지는 아직 한 줄이 비어 있다.
      - id: stop_before_truth_becomes_accusation
        label: 진실이 추궁이 되기 전에 기록을 덮는다
        outcome:
          resources:
            sanity: -1
          add_flags: [mumyeong_reads_orthodox_style_resolved, orthodox_style_trace_recorded, truth_accusation_avoided]
          add_clues: [departure_truth_still_incomplete, understanding_is_not_copying]
          destination_id: cheongryu_outer_courtyard
          log: 지금 필요한 것은 판결이 아니라 흔적이다. 천기록은 닫혔지만 이름 몇 개는 손끝에 남았다.

  - id: wuxia_mumyeong_midgame_reunion
    title: 무명 중반 재회
    body: 청류문 마당의 해가 기울자 무명이 다시 나타난다. 그는 싸움을 걸 듯 서 있지만, 시선은 서하린이 서 있던 빈 자리와 천기록의 접힌 모서리를 번갈아 스친다. 현악문과 복호금쇄수라는 이름은 아직 답이 아니라, 서로 모른 척할 수 없게 만든 흠집처럼 남아 있다.
    presentation:
      visual_id: wuxia_mumyeong_midgame_reunion
      speaker: 무명
      layout: rival_reunion_trace
      effect_cues:
        - kind: glyph_anomaly
          source: mumyeong_midgame_reunion
          intensity: 0.74
          stable_terms: [무명, 서하린, 현악문]
          distortion: rival_trace_then_old_wound
          duration_hint_ms: 1500
          fallback_text: 기울어진 마당빛과 접힌 기록 사이로 '무명', '서하린', '현악문'만 오래된 상처처럼 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [mumyeong_reads_orthodox_style_resolved, orthodox_style_trace_recorded, mumyeong_first_confrontation_resolved, mumyeong_rival_thread_opened]
      forbidden_flags: [mumyeong_midgame_reunion_resolved]
    choices:
      - id: ask_why_seoharin_never_called_him_traitor
        label: 서하린이 왜 그를 배신자라 부르지 않았는지 묻는다
        outcome:
          resources:
            sanity: -2
          add_flags: [mumyeong_midgame_reunion_resolved, mumyeong_mirror_thread_deepened, seoharin_traitor_question_asked]
          add_clues: [seoharin_does_not_call_mumyeong_traitor, mumyeong_truth_still_incomplete]
          destination_id: cheongryu_outer_courtyard
          log: 무명은 바로 대답하지 않는다. 다만 배신자라는 단어가 나오자 손끝이 먼저 굳고, 서하린이 그 말을 삼킨 이유가 아직 끝난 과거가 아님을 남긴다.
      - id: show_the_hyeonakmun_trace_without_accusing
        label: 현악문 흔적을 추궁이 아니라 기록으로 보여 준다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [mumyeong_midgame_reunion_resolved, mumyeong_mirror_thread_deepened, hyeonakmun_trace_shared_carefully]
          add_clues: [hyeonakmun_trace_shared_without_accusation, boss_used_mumyeongs_wound]
          destination_id: cheongryu_outer_courtyard
          log: 천기록의 접힌 모서리에 현악문이라는 이름을 남기자 무명의 호흡이 한 번 끊긴다. 그는 부정하지 않지만, 그 이름을 누가 이용했는지는 아직 말하지 않는다.
      - id: point_out_the_copied_form_gap
        label: 훔친 초식과 이해한 흐름이 갈라지는 틈을 짚는다
        outcome:
          resources:
            health: -1
            sanity: -2
          danger: 1
          add_flags: [mumyeong_midgame_reunion_resolved, mumyeong_mirror_thread_deepened, copied_form_gap_named]
          add_clues: [rival_mirror_relationship_deepened, copy_is_surface_not_root]
          destination_id: cheongryu_outer_courtyard
          log: 네가 틈을 짚는 순간 무명의 칼끝도 흔들린다. 서로 다른 방식으로 훔치고 배운 두 사람이 같은 빈틈을 보고 있다는 사실만 선명해진다.
      - id: keep_blades_low_and_watch_his_answer
        label: 칼끝을 낮추고 대답 대신 반응을 본다
        outcome:
          resources:
            sanity: -1
          add_flags: [mumyeong_midgame_reunion_resolved, mumyeong_mirror_thread_deepened, reunion_truth_deferred]
          add_clues: [mumyeong_truth_still_incomplete, rival_mirror_relationship_deepened]
          destination_id: cheongryu_outer_courtyard
          log: 물음은 미뤄졌지만 대치도 끝나지 않는다. 낮춘 칼끝 너머로 무명은 잠시 서하린이 있던 자리를 보고, 네가 그 시선을 보았다는 사실을 알아챈다.

  - id: wuxia_boss_first_appearance
    title: 보스 첫 등장
    body: 청류문 마당의 소란이 가라앉기도 전에 검은 깃발의 그림자가 문턱에 걸린다. 흑사방주가 한 걸음 들어서자, 천기록의 빈 줄은 이상하게도 아무 해법도 쓰지 않는다. 움직임은 보인다. 사람의 약점을 재는 순서도 보인다. 하지만 몸이 먼저 굳는다.
    presentation:
      visual_id: wuxia_boss_first_appearance
      speaker: 흑사방주
      layout: boss_wall_pressure
      effect_cues:
        - kind: glyph_anomaly
          source: boss_first_appearance
          intensity: 0.82
          stable_terms: [흑사방주, 무명, 청류문]
          distortion: boss_pressure_reads_weakness
          duration_hint_ms: 1600
          fallback_text: 검은 깃발의 그림자 속에서도 '흑사방주', '무명', '청류문'만 칼끝처럼 또렷하게 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [mumyeong_midgame_reunion_resolved, mumyeong_mirror_thread_deepened, cheongryu_raid_survived, midgame_continuity_started]
      forbidden_flags: [boss_first_appearance_resolved]
    choices:
      - id: read_the_boss_flow_and_fail_to_move
        label: 보스의 흐름을 읽지만 몸이 늦는 것을 인정한다
        outcome:
          resources:
            sanity: -3
          danger: 2
          add_flags: [boss_first_appearance_resolved, boss_wall_thread_opened, black_serpent_core_pressure_opened, boss_flow_read_but_body_lagged]
          add_clues: [boss_reads_people_not_forms, boss_is_final_logic_wall]
          destination_id: cheongryu_outer_courtyard
          log: 흐름은 보인다. 하지만 흑사방주는 초식보다 먼저 사람의 멈칫함을 베어 낸다.
      - id: pull_seo_harin_behind_broken_gate
        label: 서하린을 부서진 산문 뒤로 물린다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [boss_first_appearance_resolved, boss_wall_thread_opened, black_serpent_core_pressure_opened, seoharin_protected_from_boss_line]
          add_clues: [qingliu_cannot_outmuscle_boss_yet, boss_reads_people_not_forms]
          destination_id: cheongryu_outer_courtyard
          log: 서하린은 물러서지만 눈을 피하지 않는다. 보스는 그 작은 움직임까지 이미 계산한 듯 웃는다.
      - id: watch_mumyeong_answer_the_boss
        label: 무명이 보스의 말에 어떻게 반응하는지 본다
        outcome:
          resources:
            sanity: -2
          add_flags: [boss_first_appearance_resolved, boss_wall_thread_opened, black_serpent_core_pressure_opened, mumyeong_reacts_to_boss_voice]
          add_clues: [mumyeong_follows_power_that_saw_his_wound, boss_reads_people_not_forms]
          destination_id: cheongryu_outer_courtyard
          log: 무명은 명령보다 먼저 침묵한다. 그 침묵은 복종이면서, 아직 끊지 못한 상처처럼 보인다.
      - id: retreat_before_the_second_step
        label: 두 번째 걸음 전에 물러나 살아남는다
        outcome:
          resources:
            sanity: -1
          add_flags: [boss_first_appearance_resolved, boss_wall_thread_opened, black_serpent_core_pressure_opened, boss_retreat_survival_chosen]
          add_clues: [boss_is_final_logic_wall, qingliu_cannot_outmuscle_boss_yet]
          destination_id: cheongryu_outer_courtyard
          log: 오늘 넘을 벽이 아니라는 사실을 인정하는 것도 선택이다. 천기록은 그 후퇴를 비겁함이라 적지 않는다.

  - id: wuxia_mumyeong_request_for_aid
    title: 무명의 도움 요청
    body: 흑사방주의 그림자가 물러난 뒤에도 청류문 마당의 공기는 무겁다. 천기록의 빈 줄 옆에 오래된 객잔 이름과 반쯤 찢긴 서찰 봉인이 겹쳐 보인다. 무명은 배신자가 되기 전에 살릴 방법을 찾았고, 정파의 문턱은 그를 여러 번 돌려보낸 듯하다.
    presentation:
      visual_id: wuxia_mumyeong_request_for_aid
      speaker: 천기록
      layout: failed_aid_records
      effect_cues:
        - kind: glyph_anomaly
          source: mumyeong_rejected_aid
          intensity: 0.76
          stable_terms: [무명, 청류문, 정파]
          distortion: sealed_letters_then_closed_gates
          duration_hint_ms: 1500
          fallback_text: 접힌 서찰의 먹물 사이로 '무명', '청류문', '정파'만 문전박대의 도장처럼 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [boss_first_appearance_resolved, boss_wall_thread_opened, black_serpent_core_pressure_opened, mumyeong_mirror_thread_deepened, orthodox_style_trace_recorded, midgame_continuity_started]
      forbidden_flags: [mumyeong_request_for_aid_resolved]
    choices:
      - id: search_the_rejected_aid_letters
        label: 거절당한 도움 요청 서찰을 찾아 읽는다
        outcome:
          resources:
            sanity: -2
          add_items: [rejected_aid_letter_fragment]
          add_flags: [mumyeong_request_for_aid_resolved, mumyeong_failed_aid_thread_opened, orthodox_hypocrisy_thread_opened, rejected_aid_letters_read]
          add_clues: [mumyeong_tried_to_save_qingliu, orthodox_refusal_broke_mumyeong]
          destination_id: cheongryu_outer_courtyard
          log: 서찰에는 도움을 청한 말보다 거절의 예법이 더 길게 남아 있다. 무명은 청류문을 버리기 전에 먼저 붙잡으려 했다.
      - id: follow_old_inn_rumors_about_mumyeong
        label: 객잔에 남은 무명 소문을 좇는다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [mumyeong_request_for_aid_resolved, mumyeong_failed_aid_thread_opened, orthodox_hypocrisy_thread_opened, inn_rumor_thread_followed]
          add_clues: [boss_logic_found_mumyeongs_wound, orthodox_refusal_broke_mumyeong]
          destination_id: cheongryu_outer_courtyard
          log: 사람들은 그가 떠난 날보다 문전박대당한 밤을 더 작게 말한다. 보스는 그 작게 말해진 상처를 먼저 알아본 쪽이었다.
      - id: ask_seo_harin_what_help_never_came
        label: 서하린에게 오지 않았던 도움을 묻는다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [mumyeong_request_for_aid_resolved, mumyeong_failed_aid_thread_opened, orthodox_hypocrisy_thread_opened, seoharin_failed_aid_question_asked]
          add_clues: [seoharin_does_not_know_failed_aid, aid_refusal_precedes_departure_truth]
          destination_id: cheongryu_outer_courtyard
          log: 서하린은 그 서찰을 본 적이 없다고 말한다. 그 무지가 오히려 오래된 상처의 모양을 만든다.
      - id: keep_the_failed_aid_record_unshown
        label: 실패한 도움 요청 기록을 아직 보여주지 않는다
        outcome:
          resources:
            sanity: -1
          add_flags: [mumyeong_request_for_aid_resolved, mumyeong_failed_aid_thread_opened, orthodox_hypocrisy_thread_opened, failed_aid_record_kept_unshown]
          add_clues: [aid_refusal_precedes_departure_truth, mumyeong_tried_to_save_qingliu]
          destination_id: cheongryu_outer_courtyard
          log: 기록은 접어 둔다. 오늘 밝히지 않는 진실도, 언젠가 누군가를 살릴 수 있다.

  - id: wuxia_mumyeong_awakening
    title: 무명의 각성
    body: 접어 둔 서찰과 복호금쇄수의 흔적이 청류문 마당 위에서 겹친다. 천기록은 무명의 재능을 칭찬하지 않는다. 대신 분노가 남의 초식을 훔쳐 덧씌운 순간, 카피가 성장처럼 보였지만 사실 상처의 모양을 따라 번졌다고 적는다.
    presentation:
      visual_id: wuxia_mumyeong_awakening
      speaker: 천기록
      layout: anger_copy_bloom
      effect_cues:
        - kind: glyph_anomaly
          source: mumyeong_anger_copy_bloom
          intensity: 0.8
          stable_terms: [무명, 카피, 분노]
          distortion: stolen_forms_overlay_wound
          duration_hint_ms: 1550
          fallback_text: 번지는 먹자국 속에서도 '무명', '카피', '분노'만 상처 위에 덧씌운 초식처럼 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [mumyeong_request_for_aid_resolved, mumyeong_failed_aid_thread_opened, orthodox_hypocrisy_thread_opened, mumyeong_reads_orthodox_style_resolved, orthodox_style_trace_recorded, mumyeong_copy_style_reveal_resolved, copy_style_hint_recorded, midgame_continuity_started]
      forbidden_flags: [mumyeong_awakening_resolved]
    choices:
      - id: compare_anger_to_copied_flow
        label: 분노가 베껴 낸 흐름과 복사한 초식을 비교한다
        outcome:
          resources:
            sanity: -2
          add_flags: [mumyeong_awakening_resolved, mumyeong_awakening_thread_opened, copy_corruption_thread_opened]
          add_clues: [mumyeong_copy_bloomed_from_anger, copy_is_wound_not_growth]
          destination_id: cheongryu_outer_courtyard
          log: 천기록은 무명의 초식이 자란 것이 아니라 상처 위에 덧씌워졌다고 적는다. 카피는 재능의 이름을 빌렸지만, 처음에는 분노의 모양을 하고 있었다.
      - id: trace_awakening_from_failed_aid
        label: 도움 요청 실패가 각성으로 이어진 흔적을 좇는다
        outcome:
          resources:
            sanity: -3
          danger: 1
          add_flags: [mumyeong_awakening_resolved, mumyeong_awakening_thread_opened, copy_corruption_thread_opened]
          add_clues: [awakening_points_to_hyeonakmun_without_full_truth, mumyeong_copy_bloomed_from_anger]
          destination_id: cheongryu_outer_courtyard
          log: 거절당한 서찰과 정파식 손자국 사이에서 무명의 분노가 처음 형태를 얻는다. 현악문의 이름은 보이지만, 아직 모든 진실을 설명하지는 않는다.
      - id: ask_what_the_copy_cost_him
        label: 그 카피가 무명에게 무엇을 빼앗았는지 묻는다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [mumyeong_awakening_resolved, mumyeong_awakening_thread_opened, copy_corruption_thread_opened]
          add_clues: [copy_is_wound_not_growth, protagonist_understands_where_mumyeong_overlays]
          destination_id: cheongryu_outer_courtyard
          log: 묻는 말은 닿지만 답은 오지 않는다. 침묵이 오히려 카피의 대가를 설명한다. 너는 이해해 재구성하고, 무명은 상처 위에 훔친 흐름을 덧씌운다.
      - id: stop_before_calling_it_salvation
        label: 이것을 아직 구원이라고 부르지 않는다
        outcome:
          resources:
            sanity: -1
          add_flags: [mumyeong_awakening_resolved, mumyeong_awakening_thread_opened, copy_corruption_thread_opened]
          add_clues: [salvation_truth_still_unready, awakening_points_to_hyeonakmun_without_full_truth]
          destination_id: cheongryu_outer_courtyard
          log: 구원은 아직 이름 붙일 수 없다. 오늘은 상처가 어떻게 힘의 모양을 흉내 냈는지만 기록한다.

  - id: wuxia_qingliu_attack_after_war
    title: 무너져가는 청류문 습격의 흔적
    body: 무명의 분노가 지나간 뒤, 청류문 외원의 오래된 상처가 새삼 선명해진다. 천기록은 그 밤을 재생하지 않는다. 대신 부러진 자물쇠, 뒤틀린 문틀, 벽에 스친 손자국 사이에서 현악문이라는 이름과 복호금쇄수의 결만 조용히 골라 적는다.
    presentation:
      visual_id: wuxia_qingliu_attack_after_war
      speaker: 천기록
      layout: attack_trace_investigation
      effect_cues:
        - kind: glyph_anomaly
          source: qingliu_hyeonakmun_trace
          intensity: 0.78
          stable_terms: [청류문, 현악문, 복호금쇄수]
          distortion: broken_lock_into_finger_marks
          duration_hint_ms: 1500
          fallback_text: 갈라진 문틀의 먹자국 사이로 '청류문', '현악문', '복호금쇄수'만 낡은 흉터처럼 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [mumyeong_awakening_resolved, mumyeong_awakening_thread_opened, copy_corruption_thread_opened, mumyeong_request_for_aid_resolved, mumyeong_failed_aid_thread_opened, orthodox_hypocrisy_thread_opened, mumyeong_reads_orthodox_style_resolved, orthodox_style_trace_recorded, midgame_continuity_started]
      forbidden_flags: [qingliu_attack_after_war_resolved]
    choices:
      - id: inspect_bokho_lock_scars
        label: 자물쇠와 문틀에 남은 복호금쇄수 자국을 살핀다
        outcome:
          resources:
            sanity: -1
          add_flags: [qingliu_attack_after_war_resolved, qingliu_attack_trace_confirmed, hyeonakmun_attack_thread_opened]
          add_clues: [bokho_geumsaesu_used_on_qingliu, full_flashback_still_unopened]
          destination_id: cheongryu_outer_courtyard
          log: 천기록은 자물쇠의 상처가 무너진 힘이 아니라 잠그고 부러뜨린 손길이라고 적는다. 복호금쇄수는 여기서도 무언가를 끊어 놓았다.
      - id: compare_hyeonakmun_trace_to_qingliu_wounds
        label: 현악문 흔적과 청류문 상처의 결을 대조한다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [qingliu_attack_after_war_resolved, qingliu_attack_trace_confirmed, hyeonakmun_attack_thread_opened]
          add_clues: [qingliu_attack_trace_points_to_hyeonakmun, main_sect_not_directly_accused]
          destination_id: cheongryu_outer_courtyard
          log: 이름은 현악문 쪽을 향하지만, 천기록은 아직 한 문파 전체를 죄인으로 쓰지 않는다. 기록은 흔적을 좁히되 판결을 서두르지 않는다.
      - id: ask_seo_harin_what_she_saw_afterward
        label: 서하린이 습격 뒤에 무엇을 보았는지 조심스레 묻는다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [qingliu_attack_after_war_resolved, qingliu_attack_trace_confirmed, hyeonakmun_attack_thread_opened]
          add_clues: [seoharin_saw_aftermath_not_full_truth, qingliu_attack_trace_points_to_hyeonakmun]
          destination_id: cheongryu_outer_courtyard
          log: 서하린의 기억은 피와 빈방에 멈춰 있다. 그녀도 습격의 중심을 보지는 못했다. 그래서 질문은 답보다 조심스러워진다.
      - id: stop_before_replaying_the_attack
        label: 습격을 다시 재생하기 전에 기록을 덮는다
        outcome:
          resources:
            sanity: -1
          add_flags: [qingliu_attack_after_war_resolved, qingliu_attack_trace_confirmed, hyeonakmun_attack_thread_opened]
          add_clues: [full_flashback_still_unopened, seoharin_saw_aftermath_not_full_truth]
          destination_id: cheongryu_outer_courtyard
          log: 오늘은 회상이 아니라 흔적만 읽는다. 공격의 밤은 아직 장면으로 열리지 않는다.

  - id: wuxia_mumyeong_destroys_orthodox_sect
    title: 비어 버린 현악문 산문
    body: 현악문이라는 이름은 청류문 외원의 흉터에서 끝나지 않았다. 며칠 뒤 천기록의 여백에는 닫힌 산문, 부러진 현판, 이름이 긁혀 나간 장부 조각이 떠오른다. 기록은 멸문 장면을 재생하지 않는다. 다만 복호금쇄수의 이름이 사라진 자리와 무명의 분노가 지나간 방향만 조용히 맞춘다.
    presentation:
      visual_id: wuxia_mumyeong_destroys_orthodox_sect
      speaker: 천기록
      layout: hyeonakmun_empty_gate_record
      effect_cues:
        - kind: glyph_anomaly
          source: hyeonakmun_empty_gate_record
          intensity: 0.79
          stable_terms: [현악문, 복호금쇄수, 무명]
          distortion: broken_plaque_then_erased_roster
          duration_hint_ms: 1500
          fallback_text: 부러진 현판과 긁힌 장부 사이로 '현악문', '복호금쇄수', '무명'만 지워지지 않은 먹처럼 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [qingliu_attack_after_war_resolved, qingliu_attack_trace_confirmed, hyeonakmun_attack_thread_opened, mumyeong_awakening_resolved, midgame_continuity_started]
      forbidden_flags: [mumyeong_destroys_orthodox_sect_resolved]
    choices:
      - id: read_hyeonakmun_empty_gate_record
        label: 빈 현악문 산문에 남은 기록을 읽는다
        outcome:
          resources:
            sanity: -1
          add_flags: [mumyeong_destroys_orthodox_sect_resolved, hyeonakmun_destruction_thread_opened, departure_truth_thread_deepened]
          add_clues: [hyeonakmun_was_destroyed_after_qingliu_attack, destruction_is_consequence_not_salvation]
          destination_id: cheongryu_outer_courtyard
          log: 천기록은 멸문을 장면으로 보지 않는다. 비어 버린 산문과 끊긴 명패만이, 청류문 뒤에 현악문도 무너졌다는 결과를 말한다.
      - id: trace_bokho_lock_to_mumyeong
        label: 복호금쇄수 흔적이 무명의 분노로 되돌아간 길을 대조한다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [mumyeong_destroys_orthodox_sect_resolved, hyeonakmun_destruction_thread_opened, departure_truth_thread_deepened]
          add_clues: [mumyeong_destroyed_hyeonakmun_alone, hyeonakmun_was_destroyed_after_qingliu_attack]
          destination_id: cheongryu_outer_courtyard
          log: 복호금쇄수의 이름은 무명의 분노를 지나 현악문의 빈 문턱으로 돌아온다. 누구도 영웅담처럼 말하지 않는 길이다.
      - id: ask_why_seoharin_never_heard_full_story
        label: 왜 서하린이 전체 이야기를 듣지 못했는지 조심스럽게 묻는다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [mumyeong_destroys_orthodox_sect_resolved, hyeonakmun_destruction_thread_opened, departure_truth_thread_deepened]
          add_clues: [seoharin_truth_delivery_still_unopened, destruction_is_consequence_not_salvation]
          destination_id: cheongryu_outer_courtyard
          log: 서하린에게 닿지 못한 진실은 아직 말이 되지 않는다. 오늘은 왜 침묵이 남았는지만 적고, 그 침묵을 구원이라 부르지 않는다.
      - id: stop_before_counting_the_dead
        label: 죽은 사람의 수를 세기 전에 기록을 덮는다
        outcome:
          resources:
            sanity: -1
          add_flags: [mumyeong_destroys_orthodox_sect_resolved, hyeonakmun_destruction_thread_opened, departure_truth_thread_deepened]
          add_clues: [boss_recruitment_still_unopened, seoharin_truth_delivery_still_unopened]
          destination_id: cheongryu_outer_courtyard
          log: 죽은 사람의 수를 세기 시작하면 장면이 열린다. 천기록은 아직 그 문을 열지 않고, 다음에 누가 이 결과를 이용했는지만 빈칸으로 남긴다.

  - id: wuxia_boss_recruits_mumyeong
    title: 흑사방 보스의 스카웃 흔적
    body: 빈 현악문 산문에서 돌아온 뒤에도 천기록의 여백은 닫히지 않는다. 부러진 현판의 먹자국 끝에 흑사방의 검은 비늘 문양이 겹치고, 무명이 청류문에도 현악문에도 남을 수 없게 된 순간을 누군가 계산했다는 문장이 떠오른다. 그것은 구원이 아니라, 상처를 힘으로 바꾸는 제안이었다.
    presentation:
      visual_id: wuxia_boss_recruits_mumyeong
      speaker: 천기록
      layout: boss_recruitment_trace
      effect_cues:
        - kind: glyph_anomaly
          source: boss_recruits_mumyeong
          intensity: 0.76
          stable_terms: [흑사방주, 무명, 현악문]
          distortion: black_serpent_offer_over_empty_gate
          duration_hint_ms: 1500
          fallback_text: 검은 비늘 문양이 번져도 '흑사방주', '무명', '현악문'만 제안서의 글씨처럼 또렷하게 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [mumyeong_destroys_orthodox_sect_resolved, hyeonakmun_destruction_thread_opened, departure_truth_thread_deepened, boss_first_appearance_resolved, boss_wall_thread_opened, black_serpent_core_pressure_opened, midgame_continuity_started]
      forbidden_flags: [boss_recruits_mumyeong_resolved]
    choices:
      - id: trace_boss_offer_after_hyeonakmun
        label: 현악문 뒤에 이어진 보스의 제안을 추적한다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [boss_recruits_mumyeong_resolved, boss_recruitment_thread_opened, boss_saw_mumyeongs_wound]
          add_clues: [boss_recruited_mumyeong_after_hyeonakmun, recruitment_was_not_salvation]
          destination_id: cheongryu_outer_courtyard
          log: 보스는 무명을 건져 올린 것이 아니다. 그가 설 곳을 잃은 순간을 보고, 그 상처가 조직 안에서 얼마나 큰 힘이 될지 먼저 셈했다.
      - id: read_mumyeong_choice_without_excusing_it
        label: 무명의 선택을 변명하지 않고 해석한다
        outcome:
          resources:
            sanity: -2
          add_flags: [boss_recruits_mumyeong_resolved, boss_recruitment_thread_opened, mumyeong_choice_thread_deepened]
          add_clues: [mumyeong_had_nowhere_to_stand_after_destruction, boss_turned_wound_into_power]
          destination_id: cheongryu_outer_courtyard
          log: 무명이 어디에도 돌아갈 수 없었다는 사실은 그의 선택을 지워 주지 않는다. 다만 누가 그 빈틈을 가장 먼저 이용했는지는 선명해진다.
      - id: search_black_serpent_recruitment_record
        label: 흑사방의 스카웃 기록을 찾는다
        outcome:
          resources:
            sanity: -1
          danger: 1
          add_flags: [boss_recruits_mumyeong_resolved, boss_recruitment_thread_opened, black_serpent_recruitment_record_seen]
          add_clues: [black_serpent_recruits_wounds_not_names, boss_reads_people_not_forms]
          destination_id: cheongryu_outer_courtyard
          log: 흑사방 기록은 이름보다 결핍을 먼저 적는다. 보스가 읽은 것은 무명의 초식이 아니라, 그가 더는 돌아갈 이름을 믿지 못하게 된 자리였다.
      - id: stop_before_following_him_into_black_serpent
        label: 흑사방 안쪽까지 따라가기 전에 기록을 멈춘다
        outcome:
          resources:
            sanity: -1
          add_flags: [boss_recruits_mumyeong_resolved, boss_recruitment_thread_opened, final_boss_resolution_still_unopened]
          add_clues: [departure_truth_not_ready_for_seoharin, boss_resolution_still_unopened]
          destination_id: cheongryu_outer_courtyard
          log: 지금 본 것은 입구뿐이다. 무명이 왜 따랐는지와 서하린에게 무엇을 전해야 하는지는 남았지만, 보스의 최종 장부를 펼치기에는 아직 이르다.

  - id: wuxia_mumyeong_departure_truth_summary
    title: 봉해 둔 이탈의 진실
    body: 흑사방의 검은 비늘 문양이 사라진 뒤, 천기록은 흩어진 조각들을 한 장으로 접는다. 거절당한 도움 요청, 현악문과 복호금쇄수, 비어 버린 산문, 보스가 먼저 본 상처. 기록은 무명이 왜 떠났는지 이해할 만큼은 이어지지만, 아직 그 문장을 서하린 앞에 내려놓지는 않는다.
    presentation:
      visual_id: wuxia_mumyeong_departure_truth_summary
      speaker: 천기록
      layout: sealed_departure_truth_summary
      effect_cues:
        - kind: glyph_anomaly
          source: sealed_departure_truth_summary
          intensity: 0.74
          stable_terms: [무명, 서하린, 현악문, 흑사방주]
          distortion: sealed_truth_page_without_delivery
          duration_hint_ms: 1500
          fallback_text: 봉인된 기록 가장자리에 '무명', '서하린', '현악문', '흑사방주'만 번지지 않은 먹처럼 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [boss_recruits_mumyeong_resolved, boss_recruitment_thread_opened, mumyeong_destroys_orthodox_sect_resolved, hyeonakmun_destruction_thread_opened, departure_truth_thread_deepened, mumyeong_request_for_aid_resolved, mumyeong_failed_aid_thread_opened, orthodox_hypocrisy_thread_opened, mumyeong_awakening_resolved, midgame_continuity_started]
      forbidden_flags: [mumyeong_departure_truth_summary_resolved]
    choices:
      - id: assemble_departure_truth_without_delivering
        label: 전하지 않은 채 이탈의 진실을 정리한다
        outcome:
          resources:
            sanity: -2
          add_flags: [mumyeong_departure_truth_summary_resolved, sealed_departure_truth_summary_prepared, truth_delivery_still_unopened]
          add_clues: [departure_truth_can_be_understood_but_not_spoken_yet, seoharin_truth_delivery_requires_later_consent]
          destination_id: cheongryu_outer_courtyard
          log: 진실은 한 문장으로 묶이기 시작한다. 하지만 그 문장은 아직 서하린에게 건넬 말이 아니라, 봉인해 둔 기록으로 남는다.
      - id: compare_failed_aid_to_recruitment_offer
        label: 거절당한 도움 요청과 보스의 제안을 나란히 놓는다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [mumyeong_departure_truth_summary_resolved, sealed_departure_truth_summary_prepared, truth_delivery_still_unopened]
          add_clues: [boss_used_mumyeongs_wound_after_orthodox_refusal, departure_truth_can_be_understood_but_not_spoken_yet]
          destination_id: cheongryu_outer_courtyard
          log: 정파가 문을 닫은 자리에서 보스는 손을 내밀었다. 그것은 구원이 아니라, 버려진 상처를 자기 힘으로 계산한 제안이었다.
      - id: ask_seoharin_what_she_is_ready_to_hear
        label: 서하린이 무엇을 들을 준비가 되었는지 묻는다
        outcome:
          resources:
            sanity: -1
          danger: 1
          add_flags: [mumyeong_departure_truth_summary_resolved, sealed_departure_truth_summary_prepared, truth_delivery_still_unopened]
          add_clues: [seoharin_truth_delivery_requires_later_consent, salvation_condition_seen_but_unmet]
          destination_id: cheongryu_outer_courtyard
          log: 서하린은 무명을 배신자로 부르지 않는다. 그래서 더더욱, 진실은 폭로가 아니라 그녀가 감당할 수 있는 순간을 기다려야 한다.
      - id: seal_truth_until_mumyeong_faces_it
        label: 무명이 마주하기 전까지 진실을 봉해 둔다
        outcome:
          resources:
            sanity: -1
          add_flags: [mumyeong_departure_truth_summary_resolved, sealed_departure_truth_summary_prepared, truth_delivery_still_unopened]
          add_clues: [salvation_condition_seen_but_unmet, boss_used_mumyeongs_wound_after_orthodox_refusal]
          destination_id: cheongryu_outer_courtyard
          log: 구원 조건처럼 보이는 문장이 떠오르지만, 아직 조건을 만족한 것은 아니다. 천기록은 진실을 접어 두고 다음 대면을 기다린다.

  - id: wuxia_seoharin_empty_place
    title: 비워둔 자리
    body: 봉해 둔 진실을 품은 채 청류문 외곽 마당으로 돌아오자, 서하린은 연무장 가장자리의 빈 자리를 쓸고 있었다. 낡은 목검 하나가 벽에 기대어 있지만, 그녀는 그것을 누구의 것이라고 부르지 않는다. 기다림은 소유가 아니라, 돌아올 수 있는 자리를 지우지 않는 일처럼 보인다.
    presentation:
      visual_id: wuxia_seoharin_empty_place
      speaker: 서하린
      layout: empty_place_memory
      effect_cues:
        - kind: glyph_anomaly
          source: empty_place_memory
          intensity: 0.62
          stable_terms: [서하린, 무명, 청류문, 목검]
          distortion: unclaimed_wooden_sword_waiting_place
          duration_hint_ms: 1400
          fallback_text: 먼지 낀 연무장 위로 '서하린', '무명', '청류문', '목검'만 번지지 않는 이름처럼 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [mumyeong_departure_truth_summary_resolved, sealed_departure_truth_summary_prepared, truth_delivery_still_unopened, midgame_continuity_started]
      forbidden_flags: [seoharin_empty_place_resolved]
    choices:
      - id: ask_who_kept_the_empty_place
        label: 누가 이 빈 자리를 지켜 왔는지 묻는다
        outcome:
          resources:
            sanity: -1
          add_flags: [seoharin_empty_place_resolved, seoharin_axis_opened, empty_place_remembered, truth_delivery_still_unopened]
          add_clues: [seoharin_remembers_without_possessing, mumyeong_place_still_unclaimed]
          destination_id: cheongryu_outer_courtyard
          log: 서하린은 대답 대신 먼지를 쓸어낸다. 그 빈 자리는 무명을 변명하기 위한 자리가 아니라, 그가 돌아와도 이름을 빼앗기지 않게 남겨 둔 자리였다.
      - id: leave_the_place_unclaimed
        label: 그 자리를 누구의 것이라고 부르지 않는다
        outcome:
          resources:
            sanity: -1
          add_flags: [seoharin_empty_place_resolved, seoharin_axis_opened, empty_place_remembered, truth_delivery_still_unopened]
          add_clues: [empty_place_is_return_not_claim, seoharin_remembers_without_possessing]
          destination_id: cheongryu_outer_courtyard
          log: 이름을 붙이지 않자, 자리는 더 선명해진다. 기다림은 무명을 소유하는 방식이 아니라, 그가 돌아올 수 있는 길을 막지 않는 방식이었다.
      - id: set_down_the_work_notebook_briefly
        label: 업무수첩을 잠시 내려놓고 목검을 본다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [seoharin_empty_place_resolved, seoharin_axis_opened, empty_place_remembered, truth_delivery_still_unopened]
          add_clues: [unpriced_wooden_sword_condition_seeded, empty_place_is_return_not_claim]
          destination_id: cheongryu_outer_courtyard
          log: 천기록은 목검의 값을 쓰지 않는다. 아직 보상도 아이템도 아니지만, 값이 매겨지지 않은 물건이 언젠가 조건이 될 수 있다는 여백만 남긴다.
      - id: step_back_without_naming_mumyeong
        label: 무명의 이름을 꺼내지 않고 한 걸음 물러난다
        outcome:
          resources:
            sanity: -1
          add_flags: [seoharin_empty_place_resolved, seoharin_axis_opened, empty_place_remembered, truth_delivery_still_unopened]
          add_clues: [mumyeong_place_still_unclaimed, truth_delivery_still_requires_consent]
          destination_id: cheongryu_outer_courtyard
          log: 오늘은 진실을 전하는 날이 아니다. 서하린의 빈 자리는 대답을 강요하지 않고, 무명이 스스로 마주해야 할 순간까지 조용히 남아 있다.

  - id: wuxia_seoharin_left_meal
    title: 남겨둔 밥
    body: 늦게 돌아온 청류문 부엌 근처에는 식은 밥 한 그릇이 덮여 있다. 서하린은 설명 대신 짧게 말한다. "네 몫도 있다. 먹어." 밥은 남은 것이 아니라 남겨 둔 것이고, 청류문은 선언보다 먼저 누군가의 몫을 지우지 않는 곳처럼 느껴진다.
    presentation:
      visual_id: wuxia_seoharin_left_meal
      speaker: 서하린
      layout: left_meal_memory
      effect_cues:
        - kind: glyph_anomaly
          source: left_meal_memory
          intensity: 0.52
          stable_terms: [서하린, 밥그릇, 청류문, 귀환]
          distortion: covered_bowl_waiting_after_late_return
          duration_hint_ms: 1300
          fallback_text: 식은 밥그릇 가장자리로 '서하린', '밥그릇', '청류문', '귀환'만 따뜻한 김처럼 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [seoharin_empty_place_resolved, seoharin_axis_opened, empty_place_remembered, truth_delivery_still_unopened, midgame_continuity_started]
      forbidden_flags: [seoharin_left_meal_resolved]
    choices:
      - id: eat_the_left_meal_quietly
        label: 말없이 남겨 둔 밥을 먹는다
        outcome:
          resources:
            sanity: 1
          add_flags: [seoharin_left_meal_resolved, seoharin_axis_deepened, qingliu_belonging_warmed, truth_delivery_still_unopened]
          add_clues: [left_meal_was_kept_for_return, belonging_is_daily_care]
          destination_id: cheongryu_outer_courtyard
          log: 밥은 식었지만, 누군가의 몫이 지워지지 않았다는 사실은 따뜻하다. 청류문은 돌아왔을 때 한 그릇이 남아 있는 곳으로 조금 더 선명해진다.
      - id: thank_seoharin_for_the_bowl
        label: 서하린에게 고맙다고 말한다
        outcome:
          resources:
            sanity: -1
          add_flags: [seoharin_left_meal_resolved, seoharin_axis_deepened, qingliu_belonging_warmed, truth_delivery_still_unopened]
          add_clues: [seoharin_care_named_without_claim, left_meal_was_kept_for_return]
          destination_id: cheongryu_outer_courtyard
          log: 서하린은 "남았을 뿐이야"라고 말하지만, 밥그릇은 처음부터 덮여 있었다. 고마움은 대답을 얻지 못해도 관계의 방향을 조금 바꾼다.
      - id: joke_about_who_ordered_extra_rice
        label: 누가 밥을 더 지었냐고 농담한다
        outcome:
          resources:
            sanity: -1
          add_flags: [seoharin_left_meal_resolved, seoharin_axis_deepened, qingliu_belonging_warmed, truth_delivery_still_unopened]
          add_clues: [seoharin_deflects_care_with_plain_words, belonging_is_daily_care]
          destination_id: cheongryu_outer_courtyard
          log: 농담은 잠깐 부엌의 어색함을 덜어낸다. 서하린은 대꾸하지 않지만, 빈 그릇을 치우는 손길이 네가 이곳에 돌아온 사실을 이미 받아들였다고 말한다.
      - id: pass_without_eating_the_meal
        label: 먹지 않고 지나친다
        outcome:
          resources:
            sanity: -1
          add_flags: [seoharin_left_meal_resolved, seoharin_axis_still_open, left_meal_left_untouched, truth_delivery_still_unopened]
          add_clues: [last_bowl_epilogue_seeded, belonging_can_be_refused]
          destination_id: cheongryu_outer_courtyard
          log: 밥그릇은 그대로 남는다. 아무도 붙잡지 않지만, 먹지 않은 한 그릇은 언젠가 마지막 밥그릇으로 기억될 수 있다는 식은 여백을 남긴다.

  - id: wuxia_sado_final_phase_1_price_tag
    title: "사도 최종전 1페이즈: 가격표"
    body: 남겨둔 밥의 온기가 식기도 전에, 천기록의 여백은 흑사방 장부고로 접힌다. 검은 비늘 장부와 표국 통행세 기록, 약점 장부와 청류문 후원서 조각이 줄처럼 매달려 있고, 흑사방주는 칼보다 먼저 빚이 움직인다는 듯 웃는다. 이곳의 첫 싸움은 사도를 약하게 만드는 일이 아니라, 네가 무엇을 지키고 무엇을 포기했는지 가격표에 남기는 일이다.
    presentation:
      visual_id: wuxia_sado_final_phase_1_price_tag
      speaker: 흑사방주
      layout: final_phase_price_tag
      effect_cues:
        - kind: glyph_anomaly
          source: sado_final_phase_1_price_tag
          intensity: 0.82
          stable_terms: [흑사방주, 장부, 빚, 청류문]
          distortion: ledger_strings_name_every_price
          duration_hint_ms: 1700
          fallback_text: 검은 비늘 장부 위로 '흑사방주', '장부', '빚', '청류문'만 매겨지지 않은 값처럼 남는다.
    conditions:
      locations: [cheongryu_outer_courtyard]
      required_flags: [seoharin_left_meal_resolved, seoharin_empty_place_resolved, seoharin_axis_opened, empty_place_remembered, truth_delivery_still_unopened, boss_recruits_mumyeong_resolved, boss_recruitment_thread_opened, boss_first_appearance_resolved, black_serpent_core_pressure_opened, sealed_departure_truth_summary_prepared, midgame_continuity_started]
      forbidden_flags: [sado_final_phase_1_price_tag_resolved]
    choices:
      - id: approach_sado_before_the_ledger
        label: 장부보다 먼저 사도에게 접근한다
        outcome:
          resources:
            health: -3
            sanity: -2
          danger: 2
          add_flags: [sado_final_phase_1_price_tag_resolved, final_state_routing_seeded, final_price_tag_direct_approach, final_network_ignored_seeded, final_evidence_none_or_low_seeded, final_pressure_unresolved_seeded]
          add_clues: [sado_is_not_weakened_by_direct_bravery, black_serpent_network_may_remain, alliance_silence_evidence_weak]
          destination_id: black_serpent_ledger_vault
          log: 칼끝은 빠르게 사도에게 닿지만, 장부의 줄은 끊어지지 않는다. 네가 몸으로 벌어낸 시간만큼 흑사방의 이름 없는 빚은 다른 손으로 옮겨 적힌다.
      - id: burn_the_blackscale_ledger
        label: 검은 비늘 장부를 불태운다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [sado_final_phase_1_price_tag_resolved, final_state_routing_seeded, final_price_tag_ledger_burned, final_network_partially_destroyed_seeded, final_evidence_partial_seeded, final_pressure_partially_eased_seeded]
          add_clues: [debt_outlasts_burned_paper, evidence_burned_with_pressure]
          destination_id: black_serpent_ledger_vault
          log: 장부는 탄다. 하지만 타는 냄새 사이로 사도는 종이가 사라져도 질투와 빚은 더 오래 남는다고 말한다. 일부 압박은 풀리지만, 증거도 함께 재가 된다.
      - id: secure_the_blackscale_ledger
        label: 장부를 확보한다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [sado_final_phase_1_price_tag_resolved, final_state_routing_seeded, final_price_tag_ledger_secured, final_network_ledger_secured_seeded, final_evidence_strong_seeded, final_item_logs_blackscale_ledger_seeded]
          add_clues: [item_blackscale_ledger_logged, black_serpent_network_structure_seen, alliance_silence_accountability_seeded]
          destination_id: black_serpent_ledger_vault
          log: 검은 비늘 장부는 무겁다. 들고 나가면 네가 본 것도 함께 들고 나가야 한다는 사도의 말처럼, 당장의 칼 한 수를 포기한 대신 조직의 구조가 손안에 남는다.
      - id: ease_hostage_pressure_first
        label: 인질성 압박을 먼저 해소한다
        outcome:
          resources:
            health: -1
            sanity: -1
          danger: 1
          add_flags: [sado_final_phase_1_price_tag_resolved, final_state_routing_seeded, final_price_tag_pressure_eased, final_pressure_eased_seeded, final_qingliu_rebuild_partial_seeded, final_seoharin_axis_high_seeded]
          add_clues: [hostage_pressure_eased_before_boss, qingliu_market_pressure_softened, seoharin_waiting_is_not_price]
          destination_id: black_serpent_ledger_vault
          log: 먼저 지키는 것을 보면 나중에 무엇을 누르면 되는지도 보인다는 사도의 목소리가 낮게 깔린다. 그래도 매달린 이름 몇 개가 내려오고, 청류문과 시장의 숨통은 조금 트인다.

  - id: wuxia_sado_final_phase_2_weakpoint_control
    title: "사도 최종전 2페이즈: 약점 장악"
    body: 장부고의 줄들이 한 번에 팽팽해진다. 사도는 칼을 먼저 겨누지 않는다. 그는 서하린이 비워 둔 자리와 무명이 훔친 흐름, 청류문이 팔지 않으려 한 뜻과 천기록의 위험한 문장까지 차례로 가격표에 올린다. 네가 지키는 것이 약점이 되는 순간, 너는 그것을 약점으로만 남길지 계산식 밖의 방식으로 돌려놓을지 선택해야 한다.
    presentation:
      visual_id: wuxia_sado_final_phase_2_weakpoint_control
      speaker: 흑사방주
      layout: final_phase_weakpoint_control
      effect_cues:
        - kind: glyph_anomaly
          source: sado_final_phase_2_weakpoint_control
          intensity: 0.86
          stable_terms: [서하린, 무명, 천기록, 약점]
          distortion: guarded_names_turn_to_pressure_points
          duration_hint_ms: 1800
          fallback_text: 장부의 먹줄 사이로 '서하린', '무명', '천기록', '약점'만 압박점처럼 떠오른다.
    conditions:
      locations: [black_serpent_ledger_vault]
      required_flags: [sado_final_phase_1_price_tag_resolved, final_state_routing_seeded]
      forbidden_flags: [sado_final_phase_2_weakpoint_control_resolved]
    choices:
      - id: respond_to_seoharin_pressure
        label: 서하린 관련 압박에 대응한다
        outcome:
          resources:
            health: -1
            sanity: -2
          danger: 1
          add_flags: [sado_final_phase_2_weakpoint_control_resolved, final_phase_2_weakpoint_control_resolved, final_seoharin_axis_high_seeded, final_qingliu_rebuild_partial_seeded, final_player_method_outside_calculation_seeded]
          add_clues: [seoharin_waiting_is_not_debt, qingliu_belonging_not_price, unpriced_wooden_sword_condition_rises]
          destination_id: black_serpent_ledger_vault
          log: 사도는 기다림도 결국 빚이라고 말하지만, 너는 그 자리가 팔려고 비워 둔 것이 아니었음을 붙든다. 청류문과 서하린의 이름은 약점으로만 남지 않는다.
      - id: return_flow_to_mumyeong
        label: 무명에게 흐름을 돌려준다
        outcome:
          resources:
            sanity: -2
          danger: 1
          add_flags: [sado_final_phase_2_weakpoint_control_resolved, final_phase_2_weakpoint_control_resolved, final_mumyeong_salvation_partial_seeded, final_successor_route_suppressed_seeded, final_own_flow_choice_opened_seeded, final_player_method_protected_as_person_seeded]
          add_clues: [mumyeong_flow_is_not_tool, successor_logic_wavers, stolen_form_can_stop]
          destination_id: black_serpent_ledger_vault
          log: 무명을 사도에게 맞설 도구로 밀어 넣지 않는다. 네가 한 걸음 물러난 틈에, 훔친 초식이 아닌 자기 흐름을 고를 수 있는 아주 좁은 틈이 열린다.
      - id: read_dangerous_cheongirok_sentence
        label: 천기록의 위험한 문장을 읽는다
        outcome:
          resources:
            sanity: -3
          danger: 2
          add_flags: [sado_final_phase_2_weakpoint_control_resolved, final_phase_2_weakpoint_control_resolved, final_cheongirok_state_high_use_seeded, final_cheongirok_corruption_risk_seeded, final_evidence_partial_or_strong_seeded, final_player_method_used_as_tool_risk_seeded]
          add_clues: [cheongirok_understanding_not_calculation, text_corruption_risk_recorded, ledger_hidden_connection_seen]
          destination_id: black_serpent_ledger_vault
          log: 천기록의 문장은 장부고의 숨은 연결을 한 번에 비춘다. 이해는 빨라지지만, 사람과 관계를 계산하는 방식이 사도의 붓끝과 닮아갈 위험도 함께 번진다.
      - id: focus_on_sado
        label: 사도에게 집중한다
        outcome:
          resources:
            health: -2
            sanity: -1
          danger: 2
          add_flags: [sado_final_phase_2_weakpoint_control_resolved, final_phase_2_weakpoint_control_resolved, final_player_method_direct_boss_focus_seeded, final_relationship_pressure_unspent_seeded, final_network_residue_possible_seeded]
          add_clues: [direct_focus_leaves_pressure_behind, sado_reads_people_before_sword]
          destination_id: black_serpent_ledger_vault
          log: 사람보다 사도의 목을 먼저 본다. 틀린 선택은 아니지만, 장부고의 줄 몇 개는 그대로 남아 네가 돌보지 못한 이름들을 계속 당긴다.

  - id: wuxia_sado_final_phase_3_outside_calculation
    title: "사도 최종전 3페이즈: 계산식 밖"
    body: 장부고의 먹줄이 잠깐 멈춘다. 사도는 흔들리지 않았고, 그의 칼끝도 느려지지 않았다. 달라진 것은 네가 지금까지 남긴 자리와 흐름, 장부의 빈칸과 천기록의 사용 방식이다. 사도를 쓰러뜨리는 것과 사도의 계산법을 무력화하는 것은 다르다. 이제 남는 것은 사도의 계산식 밖에서 무엇이 실제로 작동하는지 보여 주는 선택뿐이다.
