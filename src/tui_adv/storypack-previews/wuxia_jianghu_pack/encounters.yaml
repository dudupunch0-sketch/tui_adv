          log: 사도가 쓰러져도 흑사방의 저울은 새 비늘을 찾는다. 무명은 이름이 아니라 후계 구도 위험으로 기록되고, 서하린의 마지막 밥상은 관계축이 낮을 때만 따라붙는 조건부 후보가 된다.
