encounters:
  - id: yageunmong_late_night_desk_awake
    title: 야근 중 잠깐 눈을 붙였다
    body: 잠깐 눈을 붙였을 뿐인데 모니터에는 아직 같은 업무 창이 열려 있다. 시계는 같은 분을 반복하고, 메신저에는 `아직 퇴근 승인되지 않았습니다`라는 시스템 알림이 떠 있다.
    presentation:
      visual_id: yageunmong_late_night_desk_awake
      speaker: 야근몽
      layout: storypack_preview
      effect_cues:
        - kind: glyph_anomaly
          source: desk_clock_loop
          intensity: 0.55
          stable_terms: [시계, 모니터, 퇴근 승인]
          distortion: clock_repeats_then_notification
          duration_hint_ms: 1400
          fallback_text: 시계의 초침이 같은 분을 반복하는 사이 '시계', '모니터', '퇴근 승인'만 또렷하게 남는다.
    conditions:
      locations: [yageunmong_late_night_desk]
      forbidden_flags: [yageunmong_started]
    choices:
      - id: check_clock_and_body
        label: 시계와 손목의 감각을 확인한다
        outcome:
          add_items: [cold_coffee_cup]
          add_clues: [clock_repeats_same_minute]
          add_flags: [yageunmong_started, lucid_dream_hint_seen]
          log: 시계는 같은 분을 반복하고 있었다. 커피는 식었지만 향은 방금 전 같다. 이것은 꿈일지도 모른다.
      - id: answer_manager_message
        label: 메신저 알림에 답장을 보낸다
        outcome:
          resources:
            sanity: -2
          add_clues: [clockout_not_approved_message]
          add_flags: [yageunmong_started, office_loop_started]
          log: 답장을 보냈지만 같은 알림이 다시 떴다. 승인 요청은 끝나지 않는다.
      - id: stand_up_from_desk
        label: 자리에서 일어나 복도를 확인한다
        outcome:
          destination_id: yageunmong_corridor
          add_flags: [yageunmong_started, office_loop_started]
          log: 불이 꺼진 복도 끝에 회의실 불빛이 새어 나온다. 퇴근한 사람이 없는 것 같다.

  - id: yageunmong_unapproved_meeting_room_loop
    title: 회의실은 끝나지 않는다
    body: 회의실 문을 닫고 나왔는데 다시 같은 회의실 앞이다. 회의록에는 아직 말하지 않은 발언과 이미 끝난 결론이 동시에 적혀 있고, 결론은 늘 `처음부터 다시 검토`다.
    presentation:
      visual_id: yageunmong_unapproved_meeting_room_loop
      speaker: 야근몽
      layout: storypack_preview
      effect_cues:
        - kind: glyph_anomaly
          source: meeting_room_loop
          intensity: 0.62
          stable_terms: [회의실, 회의록, 다시 검토]
          distortion: minutes_loop_then_review_stamp
          duration_hint_ms: 1300
          fallback_text: 회의실 문이 닫혔다 열리는 사이 '회의실', '회의록', '다시 검토'만 반복된다.
    conditions:
      locations: [yageunmong_meeting_room]
      required_flags: [yageunmong_started]
      forbidden_flags: [meeting_loop_seen]
    choices:
      - id: leave_room_without_answering
        label: 아무것도 답하지 않고 회의실을 나온다
        outcome:
          destination_id: yageunmong_corridor
          add_flags: [meeting_loop_seen]
          add_clues: [repeated_action_items]
          log: 문을 닫고 나왔다. 그런데 복도가 다시 같은 회의실로 이어진다. 루프를 인식했다.
      - id: read_repeated_action_items
        label: 반복되는 액션 아이템을 읽는다
        outcome:
          resources:
            sanity: -2
          add_items: [minutes_fragment]
          add_flags: [meeting_loop_seen]
          add_clues: [repeated_action_items, future_minutes_line]
          log: 회의록에는 아직 논의하지 않은 안건이 이미 완료로 표시되어 있다. 꿈이 시간을 섞었다.
      - id: add_note_that_meeting_is_dream
        label: 회의록 여백에 '이것은 꿈이다'라고 적는다
        outcome:
          resources:
            sanity: -1
          add_flags: [meeting_loop_seen, lucid_note_added]
          add_clues: [repeated_action_items]
          log: 펜으로 적었지만 다음 줄에는 이미 지워진 흔적만 남는다. 꿈의 루프는 기록을 허용하지 않는다.

  - id: yageunmong_unread_mail_wall
    title: 읽지 않은 메일의 벽
    body: 복도 끝에 메일 제목들이 종이처럼 겹쳐 벽을 만든다. 긴급, 재송부, 확인 요청, 방금 보낸 메일이 같은 시간으로 찍혀 있고, 열지 않은 알림은 주인공의 이름을 점점 크게 부른다.
    presentation:
      visual_id: yageunmong_unread_mail_wall
      speaker: 야근몽
      layout: storypack_preview
      effect_cues:
        - kind: glyph_anomaly
          source: mail_wall_notification_loop
          intensity: 0.58
          stable_terms: [메일, 알림, 이름]
          distortion: notification_names_grow_louder
          duration_hint_ms: 1200
          fallback_text: 메일 제목들이 겹쳐 쌓이는 사이 '메일', '알림', '이름'만 반복해서 커진다.
    conditions:
      locations: [yageunmong_corridor]
      required_flags: [yageunmong_started, meeting_loop_seen]
      forbidden_flags: [mail_wall_seen]
    choices:
      - id: turn_off_noncritical_notifications
        label: 중요하지 않은 알림을 모두 끈다
        outcome:
          add_flags: [mail_wall_seen, notification_boundary_set]
          add_clues: [not_every_message_matters]
          log: 알림 소리가 잦아들었다. 모든 메일을 열지 않아도 복도가 조금 더 넓어졌다.
      - id: open_every_unread_mail
        label: 읽지 않은 메일을 모두 열어 본다
        outcome:
          resources:
            sanity: -3
          add_flags: [mail_wall_seen, mail_wall_rule_confirmed]
          add_clues: [not_every_message_matters, noise_hides_anchor_message]
          log: 메일을 모두 열었지만 벽은 더 두꺼워졌다. 알림을 처리할수록 새 알림이 쌓인다.
      - id: search_for_one_real_message
        label: 진짜 신호가 될 만한 메일 하나를 찾는다
        outcome:
          resources:
            sanity: -1
          add_items: [unread_mail_header_fragment]
          add_flags: [mail_wall_seen]
          add_clues: [noise_hides_anchor_message]
          log: 수백 개의 제목 사이에 한 줄이 낯설었다. '아직 여기 있니?' 발신자는 비어 있었다.

  - id: yageunmong_manager_approval_trap
    title: 결재는 반려된다
    body: "결재 화면은 `퇴근 요청: 반려`를 반복한다. 팀장은 일단 진행하라고 말하지만 책임은 주인공에게 남긴다. 조직도에서 주인공의 이름은 담당자 칸에 계속 복제된다."
    presentation:
      visual_id: yageunmong_manager_approval_trap
      speaker: 야근몽
      layout: storypack_preview
      effect_cues:
        - kind: glyph_anomaly
          source: approval_rejection_loop
          intensity: 0.65
          stable_terms: [결재, 반려, 담당자]
          distortion: name_duplicates_in_org_chart
          duration_hint_ms: 1500
          fallback_text: 결재 화면이 반복되는 사이 '결재', '반려', '담당자'가 점점 늘어난다.
    conditions:
      locations: [yageunmong_approval_desk]
      required_flags: [meeting_loop_seen]
      forbidden_flags: [approval_trap_seen]
    choices:
      - id: define_scope_of_responsibility
        label: 내 업무 범위를 직접 정의한다
        outcome:
          add_flags: [approval_trap_seen, permission_rule_resisted]
          add_clues: [responsibility_scope_boundary]
          log: 결재 화면을 닫고 내가 할 수 있는 것과 할 수 없는 것을 적었다. 조직도의 복제가 멈췄다.
      - id: request_approval_again
        label: 다시 한 번 승인을 요청한다
        outcome:
          resources:
            sanity: -3
          add_items: [rejected_clockout_request]
          add_flags: [approval_trap_seen]
          add_clues: [clockout_is_not_approved_by_manager]
          log: 같은 화면이 다시 `반려`를 찍었다. 승인을 기다리는 것은 해결이 아니었다.
      - id: close_approval_window
        label: 결재 창을 닫고 자리를 뜬다
        outcome:
          resources:
            sanity: -1
          add_flags: [approval_trap_seen, permission_rule_resisted]
          add_clues: [clockout_is_not_approved_by_manager, responsibility_scope_boundary]
          log: 창을 닫자 팀장의 목소리가 멀어졌다. 퇴근은 승인받는 것이 아닐지도 모른다.

  - id: yageunmong_reality_anchor_pantry
    title: 탕비실의 현실 앵커
    body: 탕비실의 커피는 식었지만 향은 방금 전 같다. 프린터 위 문서에는 업무 지시 대신 `집에 가야 한다`는 문장이 한 줄만 찍혀 있고, 멀리서 현실 알람음 같은 소리가 난다.
    presentation:
      visual_id: yageunmong_reality_anchor_pantry
      speaker: 야근몽
      layout: storypack_preview
      effect_cues:
        - kind: glyph_anomaly
          source: pantry_anchor_sensory
          intensity: 0.40
          stable_terms: [커피, 향, 알람음]
          distortion: real_scent_breaks_loop
          duration_hint_ms: 1100
          fallback_text: 탕비실의 감각이 루프를 잠깐 끊는다. '커피', '향', '알람음'이 또렷해진다.
    conditions:
      locations: [yageunmong_pantry]
      required_flags: [approval_trap_seen]
      forbidden_flags: [reality_anchor_found]
    choices:
      - id: breathe_and_name_the_anchor
        label: 커피 향을 천천히 들이마시며 지금 있는 곳을 확인한다
        outcome:
          add_flags: [reality_anchor_found]
          add_clues: [cold_coffee_anchor]
          log: 향이 꿈의 루프를 잠깐 끊었다. 나는 지금 탕비실에 있고, 어딘가에서 알람이 울리고 있다.
      - id: pocket_printed_sentence
        label: 프린터의 한 줄짜리 문서를 챙긴다
        outcome:
          resources:
            sanity: -1
          add_items: [anchor_fragment]
          add_flags: [reality_anchor_found]
          add_clues: [cold_coffee_anchor, homeward_intent_line]
          log: 문서를 주머니에 넣었다. `집에 가야 한다`. 꿈이 허락한 문장인지 모르겠지만, 기억하겠다.
      - id: follow_alarm_sound
        label: 알람음이 나는 방향으로 걷는다
        outcome:
          destination_id: yageunmong_corridor
          add_flags: [reality_anchor_found, alarm_sound_heard]
          add_clues: [homeward_intent_line]
          log: 소리를 따라가다 복도에서 멈췄다. 알람은 꿈 바깥에서 오는 것 같았다.

  - id: yageunmong_dead_project_server_log
    title: 죽은 프로젝트의 서버 로그
    body: 서버룸 콘솔에는 이미 닫힌 프로젝트의 빌드 로그가 반복된다. 실패 줄마다 주인공 이름이 붙지만, 중간에 한 줄만 낯설다. `저장하고 닫아도 된다`.
    presentation:
      visual_id: yageunmong_dead_project_server_log
      speaker: 야근몽
      layout: storypack_preview
      effect_cues:
        - kind: glyph_anomaly
          source: server_log_guilt_loop
          intensity: 0.60
          stable_terms: [로그, 실패, 저장]
          distortion: name_repeats_in_build_log
          duration_hint_ms: 1350
          fallback_text: 빌드 로그가 반복되는 사이 '로그', '실패', '저장'이 화면에 박힌다.
    conditions:
      locations: [yageunmong_server_room]
      required_flags: [meeting_loop_seen]
      forbidden_flags: [dead_project_log_seen]
    choices:
      - id: copy_only_the_anchor_line
        label: 낯선 한 줄만 별도로 복사한다
        outcome:
          add_items: [server_log_anchor_fragment]
          add_flags: [dead_project_log_seen]
          add_clues: [save_and_close_anchor_line]
          log: 그 한 줄만 메모했다. `저장하고 닫아도 된다`. 나머지 로그는 내 이름을 부르는 것을 멈추지 않았다.
      - id: rerun_the_dead_build
        label: 죽은 빌드를 다시 실행한다
        outcome:
          resources:
            sanity: -3
          add_flags: [dead_project_log_seen, guilt_loop_confirmed]
          add_clues: [failure_is_record_not_sentence]
          log: 빌드는 같은 지점에서 실패했다. 다시 실행해도 결과는 바뀌지 않는다. 이건 기록이지 선고가 아니다.
      - id: mark_failure_as_record_not_sentence
        label: 실패 줄에 '이것은 기록이다'라고 덧붙인다
        outcome:
          resources:
            sanity: -1
          add_flags: [dead_project_log_seen, failure_record_thread]
          add_clues: [failure_is_record_not_sentence, save_and_close_anchor_line]
          log: 실패 줄 옆에 한 줄을 더 적었다. 로그가 잠시 조용해졌다. 실패는 끝내야 할 것이 아니라 기록으로 닫을 수 있는 것이다.

  - id: yageunmong_awakening_fragment_choice
    title: 각성편린 — 하나를 선택한다
    body: 문서 편집창의 빈 줄에 세 문장이 떠오른다. `이건 꿈이다`, `이 일은 내 일이 아니다`, `문을 닫고 나간다`. 하나를 선택하면 나머지 두 줄은 삭제 기록 없이 사라진다.
    presentation:
      visual_id: yageunmong_awakening_fragment_choice
      speaker: 야근몽
      layout: fragment_choice
      effect_cues:
        - kind: glyph_anomaly
          source: awakening_fragment_three_lines
          intensity: 0.70
          stable_terms: [꿈, 내 일, 문]
          distortion: two_lines_vanish_after_choice
          duration_hint_ms: 1600
          fallback_text: 세 문장이 화면에 떠올랐다가 하나를 선택하는 순간 나머지 둘이 지워진다.
    conditions:
      locations: [yageunmong_corridor, yageunmong_pantry, yageunmong_approval_desk, yageunmong_server_room]
      required_flags: [reality_anchor_found]
      forbidden_flags: [awakening_fragment_seen]
    choices:
      - id: delay_fragment_choice
        label: 세 문장을 모두 읽고 잠시 멈춘다
        outcome:
          add_clues: [fragment_is_growth_direction]
          log: 세 문장을 천천히 읽었다. 아직 고르지 못했다. 기회가 남아 있을지 모른다.
      - id: choose_this_is_a_dream
        label: "이건 꿈이다를 붙든다 — 나머지 둘은 사라진다"
        outcome:
          add_flags: [awakening_fragment_seen, first_awakened_fragment_chosen, lucidity_thread]
          add_clues: [fragment_is_growth_direction, not_all_work_can_be_done]
          log: "이건 꿈이다를 선택하자 나머지 두 줄이 삭제 기록 없이 사라졌다. 자각이 깨어나는 첫 실마리가 되었다."
      - id: choose_not_my_work
        label: "이 일은 내 일이 아니다를 붙든다 — 나머지 둘은 사라진다"
        outcome:
          add_flags: [awakening_fragment_seen, first_awakened_fragment_chosen, responsibility_boundary_thread]
          add_clues: [fragment_is_growth_direction, not_all_work_can_be_done]
          log: "이 일은 내 일이 아니다를 선택하자 나머지 두 줄이 흔적 없이 지워졌다. 경계를 긋는 실마리가 남았다."
      - id: choose_close_the_door
        label: "문을 닫고 나간다를 붙든다 — 나머지 둘은 사라진다"
        outcome:
          add_flags: [awakening_fragment_seen, first_awakened_fragment_chosen, clockout_gate_thread]
          add_clues: [fragment_is_growth_direction, not_all_work_can_be_done]
          log: "문을 닫고 나간다를 선택하자 나머지 두 줄은 사라졌다. 퇴근 게이트로 향하는 실마리가 생겼다."

  - id: yageunmong_coworker_meeting_room_rescue
    title: 회의실에 남은 동료
    body: 불이 꺼지지 않는 회의실 안에서 한 사람이 같은 문장을 반복한다. "이거 끝나면 나갈 수 있겠지?" 회의록은 그의 이름을 참석자, 액션 아이템, 미완료 사유에 동시에 적고 있다.
    presentation:
      visual_id: yageunmong_coworker_meeting_room_rescue
      speaker: 야근몽
      layout: storypack_preview
      effect_cues:
        - kind: glyph_anomaly
          source: coworker_loop_minutes
          intensity: 0.55
          stable_terms: [동료, 회의록, 미완료]
          distortion: name_listed_in_every_column
          duration_hint_ms: 1300
          fallback_text: 회의록이 같은 이름을 반복해 쓰는 사이 '동료', '회의록', '미완료'가 겹쳐 보인다.
    conditions:
      locations: [yageunmong_meeting_room]
      required_flags: [first_awakened_fragment_chosen]
      forbidden_flags: [coworker_meeting_room_seen]
    choices:
      - id: tell_coworker_this_is_a_dream
        label: 동료에게 이것이 꿈이라고 말한다
        outcome:
          resources:
            sanity: -1
          add_flags: [coworker_meeting_room_seen, coworker_lucidity_thread]
          add_clues: [coworker_cannot_be_saved_by_work]
          log: "이것은 꿈이라고 말했다. 동료는 잠시 멈추더니 회의록을 내려다봤다. 그의 이름이 더 이상 늘어나지 않았다."
      - id: finish_coworkers_action_items
        label: 동료의 액션 아이템을 대신 완료한다
        outcome:
          resources:
            sanity: -3
          add_flags: [coworker_meeting_room_seen, rescue_trap_confirmed]
          add_clues: [coworker_cannot_be_saved_by_work]
          log: 액션 아이템을 모두 처리했지만 회의록은 새 항목을 생성했다. 업무 대행은 구출이 아니었다.
      - id: share_reality_anchor
        label: 현실 앵커를 함께 나눈다
        outcome:
          add_items: [shared_anchor_note]
          add_flags: [coworker_meeting_room_seen, anchor_shared_with_coworker]
          add_clues: [open_door_matters_more_than_minutes]
          log: 현실의 감각을 함께 나눴다. 동료의 표정이 조금 달라졌다. 회의록 반복이 느려지는 것 같았다.
      - id: leave_door_open_without_solving_minutes
        label: 회의록을 해결하지 않고 문을 열어 둔 채 나온다
        outcome:
          destination_id: yageunmong_corridor
          add_flags: [coworker_meeting_room_seen, meeting_room_rescue_route]
          add_clues: [open_door_matters_more_than_minutes]
          log: 회의록을 덮지 않고 문만 열어 뒀다. 동료가 따라오는지는 알 수 없지만, 문은 닫히지 않았다.

  - id: yageunmong_elevator_unapproved_floor
    title: 엘리베이터 — 미승인층
    body: 엘리베이터에는 B1, 13F, 0F, 미승인층, 퇴근층이 번갈아 뜬다. 닫힘 버튼은 작동하지 않고, 열림 버튼 옆에는 `상위 승인 필요`라는 라벨이 붙어 있다.
    presentation:
      visual_id: yageunmong_elevator_unapproved_floor
      speaker: 야근몽
      layout: storypack_preview
      effect_cues:
        - kind: glyph_anomaly
          source: elevator_floor_loop
          intensity: 0.65
          stable_terms: [엘리베이터, 미승인층, 퇴근층]
          distortion: floors_flicker_approval_label
          duration_hint_ms: 1400
          fallback_text: 층수 표시가 깜빡이는 사이 '엘리베이터', '미승인층', '퇴근층'만 또렷하게 남는다.
    conditions:
      locations: [yageunmong_elevator]
      required_flags: [first_awakened_fragment_chosen]
      forbidden_flags: [unapproved_floor_seen]
    choices:
      - id: step_out_before_floor_is_approved
        label: 승인 없이 문이 열리는 즉시 내린다
        outcome:
          destination_id: yageunmong_exit_gate
          add_flags: [unapproved_floor_seen, permission_rule_resisted]
          add_clues: [elevator_permission_is_trap]
          log: 승인 신호를 기다리지 않고 문이 열리자마자 내렸다. 퇴근 게이트의 불빛이 보인다.
      - id: wait_for_approval_floor
        label: 승인이 날 때까지 엘리베이터 안에서 기다린다
        outcome:
          resources:
            sanity: -3
          add_flags: [unapproved_floor_seen, approval_wait_loop_confirmed]
          add_clues: [elevator_permission_is_trap]
          log: 기다렸지만 승인층은 오지 않았다. 엘리베이터는 같은 층을 반복했다. 기다림이 함정이었다.
      - id: press_clockout_floor_without_badge
        label: 배지 없이 퇴근층 버튼을 누른다
        outcome:
          destination_id: yageunmong_exit_gate
          add_flags: [unapproved_floor_seen, clockout_floor_glimpsed]
          add_clues: [clockout_floor_exists, elevator_permission_is_trap]
          log: 배지 인식 없이 퇴근층 버튼을 눌렀다. 화면이 잠깐 흔들리더니 게이트가 보이는 층에서 열렸다.

  - id: yageunmong_clockout_gate_route_split
    title: 퇴근 게이트 — 갈라지는 길
    body: "퇴근 게이트는 열린 듯 보이지만, 뒤쪽 회의실에서는 아직 누군가 이름을 부른다. 게이트 화면에는 세 줄이 동시에 떠 있다. `혼자 퇴근`, `동료 확인`, `업무 계속`."
    presentation:
      visual_id: yageunmong_clockout_gate_route_split
      speaker: 야근몽
      layout: storypack_preview
      effect_cues:
        - kind: glyph_anomaly
          source: gate_route_split
          intensity: 0.72
          stable_terms: [게이트, 퇴근, 동료]
          distortion: three_lines_flicker_on_screen
          duration_hint_ms: 1600
          fallback_text: 게이트 화면의 세 줄이 깜빡이는 사이 '게이트', '퇴근', '동료'가 선명해진다.
    conditions:
      locations: [yageunmong_exit_gate]
      required_flags: [unapproved_floor_seen]
      forbidden_flags: [clockout_gate_route_split_seen]
    choices:
      - id: wake_alone_now
        label: 지금 혼자 게이트를 통과한다
        outcome:
          add_flags: [clockout_gate_route_split_seen, wake_up_route_started]
          add_clues: [permission_is_the_trap]
          log: 혼자 게이트를 통과했다. 뒤쪽 목소리가 멀어졌다. 꿈의 규칙을 거부한 순간 출구가 선명해졌다.
      - id: return_for_coworker_anchor
        label: 동료를 확인하러 잠깐 돌아간다
        outcome:
          destination_id: yageunmong_meeting_room
          add_flags: [clockout_gate_route_split_seen, coworker_rescue_route_started]
          add_clues: [coworker_voice_behind_gate]
          log: 게이트 앞에서 돌아섰다. 동료 목소리가 회의실에서 들렸다. 함께 나가는 route가 열렸다.
      - id: continue_work_until_clear
        label: 업무를 모두 정리한 뒤 나간다
        outcome:
          add_flags: [clockout_gate_route_split_seen, loop_failure_route_marked]
          add_clues: [work_never_completes]
          log: 업무를 정리하려 했지만 목록은 줄지 않았다. 게이트 화면이 다시 `퇴근 승인 대기`로 돌아갔다. 루프가 시작되는 느낌이다.
      - id: breathe_and_check_gate_rule
        label: 게이트 규칙을 천천히 확인한다
        outcome:
          add_flags: [clockout_gate_route_split_seen]
          add_clues: [permission_is_the_trap]
          log: 게이트 화면을 읽었다. 승인 버튼은 없었다. 퇴근은 누군가에게 허가받는 것이 아니었다.

  - id: yageunmong_clockout_gate_self
    title: 퇴근 게이트 — 나 자신과 마주하다
    body: "출입 게이트 앞에는 주인공과 같은 얼굴을 한 사람이 서 있다. 그는 말한다. \"조금만 더 하면 돼.\" 게이트 화면에는 `퇴근 승인 대기`가 깜빡이고, 뒤쪽 회의실에서는 아직도 누군가 이름을 부른다."
    presentation:
      visual_id: yageunmong_clockout_gate_self
      speaker: 야근몽
      layout: storypack_preview
      effect_cues:
        - kind: glyph_anomaly
          source: self_mirror_gate
          intensity: 0.80
          stable_terms: [게이트, 나 자신, 퇴근 선언]
          distortion: mirror_face_blocks_exit
          duration_hint_ms: 1800
          fallback_text: 게이트 앞에서 같은 얼굴과 마주치는 순간 '게이트', '나 자신', '퇴근 선언'이 겹쳐 번진다.
    conditions:
      locations: [yageunmong_exit_gate]
      required_flags: [wake_up_route_started]
      forbidden_flags: [clockout_gate_seen]
    choices:
      - id: breathe_before_answering_self
        label: 자신에게 대답하기 전에 숨을 고른다
        outcome:
          add_flags: [clockout_gate_seen, self_confronted]
          add_clues: [permission_is_the_trap]
          log: 숨을 고르자 같은 얼굴의 사람이 잠시 흔들렸다. 나는 꿈 안에 있고, 저 사람도 꿈의 일부다.
      - id: promise_to_finish_one_more_task
        label: 하나만 더 끝내고 나오겠다고 약속한다
        outcome:
          resources:
            sanity: -3
          add_flags: [clockout_gate_seen, loop_failure_hint_accepted]
          add_clues: [work_never_completes]
          log: 하나만 더 하겠다고 약속했다. 같은 얼굴이 미소를 지었다. 게이트가 다시 닫혔다. 다시 루프다.
      - id: declare_clockout_without_approval
        label: 승인 없이 퇴근을 선언한다
        outcome:
          add_items: [clockout_declaration_note]
          add_flags: [clockout_gate_seen, self_confronted, wake_route_flag]
          add_clues: [permission_is_the_trap]
          log: "\"나는 지금 퇴근한다.\" 같은 얼굴의 사람이 사라졌다. 게이트 화면의 깜빡임이 멈추고 문이 열렸다."
      - id: call_coworker_to_gate
        label: 동료를 불러 함께 게이트를 통과한다
        outcome:
          add_items: [clockout_declaration_note]
          add_flags: [clockout_gate_seen, self_confronted, wake_route_flag, coworker_rescue_thread]
          add_clues: [permission_is_the_trap]
          log: 동료와 함께 게이트 앞에 섰다. 같은 얼굴의 사람이 둘 앞에서 버티다 사라졌다. 문이 열렸다.

  - id: yageunmong_wake_desk_aftermath
    title: 깨어난 뒤 — 책상 앞
    body: 눈을 뜨자 현실에서는 얼마 지나지 않았다. 모니터에는 아직 처리하지 않은 업무가 남아 있다. 메신저 알림은 켜져 있지만, 이번에는 노트북을 닫을 수 있다. 다음 날 동료는 꿈을 기억하지 못하는 듯하다가 회의실 문 이야기를 조용히 꺼낸다.
    presentation:
      visual_id: yageunmong_wake_desk_aftermath
      speaker: 야근몽
      layout: storypack_preview
      effect_cues:
        - kind: glyph_anomaly
          source: wake_aftermath_desk
          intensity: 0.25
          stable_terms: [노트북, 알림, 동료]
          distortion: dream_fades_real_remains
          duration_hint_ms: 900
          fallback_text: 꿈의 잔상이 옅어지는 사이 '노트북', '알림', '동료'가 현실 감각으로 돌아온다.
    conditions:
      locations: [yageunmong_exit_gate]
      required_flags: [wake_route_flag]
      forbidden_flags: [wake_aftermath_seen]
    choices:
      - id: close_laptop_and_leave
        label: 노트북을 닫고 자리를 뜬다
        outcome:
          add_flags: [wake_aftermath_seen, laptop_closed_after_wake, yageunmong_awakened]
          add_clues: [work_remains_but_can_be_left]
          log: 노트북을 닫았다. 업무는 아직 남았지만, 오늘은 나갈 수 있다. 꿈은 끝났다.
      - id: write_one_boundary_note
        label: 경계 메모 하나를 남기고 나간다
        outcome:
          resources:
            sanity: -1
          add_flags: [wake_aftermath_seen, boundary_afterword, yageunmong_awakened]
          add_clues: [work_remains_but_can_be_left]
          log: 메모 한 장을 남겼다. 내일의 나에게 남기는 경계선. 노트북을 닫고 나갔다.
      - id: ask_coworker_about_meeting_room_dream
        label: 동료에게 회의실 꿈에 대해 조용히 묻는다
        outcome:
          add_flags: [wake_aftermath_seen, coworker_trace_afterword, yageunmong_awakened]
          add_clues: [dream_trace_in_coworker_memory]
          log: 동료는 잠시 멈추더니 회의실 문 이야기를 꺼냈다. 꿈의 흔적은 현실에도 남아 있었다.
