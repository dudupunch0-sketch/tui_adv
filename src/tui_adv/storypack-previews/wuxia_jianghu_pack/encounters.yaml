          resources:
            sanity: -3
          danger: 2
          add_flags: [mumyeong_resolution_resolved, final_mumyeong_resolution_black_serpent_successor_seeded, final_mumyeong_successor_route_active_seeded, final_epilogue_mumyeong_black_serpent_new_scale_candidate_seeded, final_epilogue_mumyeong_new_shadow_variant_seeded, final_epilogue_seoharin_last_bowl_conditional_seeded]
